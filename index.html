<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Patas · Rede social de pets</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF8C42">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Patas">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --brand:#FF8C42; --brand2:#e11d48; --green:#10b981;
            --bg:#faf8f5; --card:#fff; --border:#f0f0f0;
            --text:#1a1a2e; --muted:#7a869a;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg); height:100vh; overflow:hidden; display:flex; justify-content:center; align-items:center; padding:12px; }
        .app-wrap { max-width:450px; width:100%; height:100%; background:var(--card); border-radius:40px; box-shadow:0 25px 50px -12px rgba(0,0,0,.25); overflow:hidden; display:flex; flex-direction:column; position:relative; }

        /* OFFLINE BANNER */
        #offlineBanner { display:none; position:absolute; top:0; left:0; right:0; background:#e11d48; color:#fff; font-size:.78rem; font-weight:600; text-align:center; padding:6px 12px; z-index:999; border-radius:40px 40px 0 0; }

        /* AUTH */
        #authScreen { position:absolute; inset:0; z-index:50; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 28px; background:linear-gradient(160deg,#fff8f0 0%,#fff 60%); border-radius:40px; }
        .auth-paw { font-size:4.5rem; animation:wag 2s ease-in-out infinite; }
        @keyframes wag { 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(8deg)} }
        .auth-logo { font-size:2.4rem; font-weight:900; margin:8px 0 4px; background:linear-gradient(135deg,var(--brand),var(--brand2)); background-clip:text; -webkit-background-clip:text; color:transparent; }
        .auth-tag { font-size:.82rem; color:var(--muted); margin-bottom:24px; text-align:center; }
        .auth-field { width:100%; margin-bottom:10px; }
        .auth-field label { display:block; font-size:.75rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; padding-left:6px; }
        .auth-inp { width:100%; padding:13px 18px; border-radius:40px; border:1.5px solid #e2e8f0; font-family:inherit; font-size:.9rem; outline:none; transition:border-color .2s; }
        .auth-inp:focus { border-color:var(--brand); }
        .auth-btn { width:100%; padding:14px; border-radius:40px; border:none; background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff; font-weight:700; font-size:.95rem; cursor:pointer; transition:opacity .2s,transform .1s; min-height:44px; }
        .auth-btn:active { transform:scale(.98); }
        .auth-btn:disabled { opacity:.6; cursor:not-allowed; }
        .auth-btn.secondary { background:#fff; border:1.5px solid #e2e8f0; color:var(--text); display:flex; align-items:center; justify-content:center; gap:10px; margin-top:10px; }
        .auth-divider { display:flex; align-items:center; gap:10px; margin:14px 0; width:100%; color:var(--muted); font-size:.8rem; }
        .auth-divider::before,.auth-divider::after { content:''; flex:1; height:1px; background:#e2e8f0; }
        .auth-err { color:var(--brand2); font-size:.78rem; margin:4px 0; min-height:18px; text-align:center; }
        .auth-switch { margin-top:16px; font-size:.82rem; color:var(--muted); }
        .auth-switch a { color:var(--brand); font-weight:600; cursor:pointer; }

        /* APP SHELL */
        #appShell { display:none; flex-direction:column; height:100%; width:100%; }
        .app-header { background:#fff; padding:18px 20px 12px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
        .logo { font-size:1.7rem; font-weight:900; background:linear-gradient(135deg,var(--brand),var(--brand2)); background-clip:text; -webkit-background-clip:text; color:transparent; }
        .hdr-actions { display:flex; gap:10px; align-items:center; }
        .icon-btn { background:none; border:none; font-size:1.25rem; cursor:pointer; color:#64748b; padding:10px; position:relative; min-width:44px; min-height:44px; display:flex; align-items:center; justify-content:center; border-radius:50%; transition:background .15s; }
        .icon-btn:hover { background:#f8fafc; }
        .notif-dot { position:absolute; top:4px; right:4px; width:8px; height:8px; background:var(--brand2); border-radius:50%; border:2px solid #fff; }
        .nav-badge { position:absolute; top:2px; right:2px; background:var(--brand2); color:#fff; font-size:.55rem; font-weight:800; border-radius:40px; padding:1px 5px; border:2px solid #fff; min-width:18px; text-align:center; }
        .u-avatar { width:28px; height:28px; border-radius:50%; object-fit:cover; border:2px solid var(--brand); cursor:pointer; }
        .main { flex:1; overflow-y:auto; padding:16px; scroll-behavior:smooth; }
        .main::-webkit-scrollbar { width:0; }

        /* SCROLL TO TOP FAB */
        #fabTop { position:fixed; bottom:96px; right:calc(50% - 225px + 16px); background:var(--brand); color:#fff; border:none; width:40px; height:40px; border-radius:50%; font-size:1rem; cursor:pointer; box-shadow:0 4px 16px rgba(255,140,66,.4); display:none; align-items:center; justify-content:center; z-index:200; transition:opacity .2s; }

        /* BOTTOM NAV */
        .bottom-nav { background:rgba(255,255,255,.96); backdrop-filter:blur(10px); border-top:1px solid #edf2f7; display:flex; justify-content:space-around; padding:10px 20px; padding-bottom:max(20px, env(safe-area-inset-bottom)); flex-shrink:0; }
        .nav-btn { display:flex; flex-direction:column; align-items:center; gap:3px; font-size:.65rem; font-weight:600; color:var(--muted); background:none; border:none; cursor:pointer; transition:color .15s; position:relative; min-width:44px; min-height:44px; justify-content:center; padding:4px; }
        .nav-btn.active { color:var(--brand); }
        .nav-btn i { font-size:1.4rem; }

        /* STORIES */
        .stories { display:flex; gap:12px; overflow-x:auto; padding-bottom:4px; margin-bottom:18px; scrollbar-width:none; }
        .stories::-webkit-scrollbar { display:none; }
        .story { display:flex; flex-direction:column; align-items:center; gap:4px; flex-shrink:0; cursor:pointer; }
        .story-ring { width:60px; height:60px; border-radius:50%; background:linear-gradient(135deg,var(--brand),var(--brand2)); padding:2.5px; transition:transform .15s; }
        .story-ring.seen { background:#e2e8f0; }
        .story-ring.unseen { animation:storyPulse 2s ease-in-out infinite; }
        @keyframes storyPulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,140,66,.5)} 50%{box-shadow:0 0 0 5px rgba(255,140,66,0)} }
        .story-ring:active { transform:scale(.92); }
        .story-inner { width:100%; height:100%; border-radius:50%; overflow:hidden; border:2.5px solid #fff; background:#fed7aa; }
        .story-inner img { width:100%; height:100%; object-fit:cover; }
        .story-name { font-size:.65rem; color:var(--text); font-weight:500; max-width:60px; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .add-story-btn { width:60px; height:60px; border-radius:50%; background:linear-gradient(135deg,#fef3c7,#fed7aa); display:flex; align-items:center; justify-content:center; font-size:1.3rem; cursor:pointer; border:2px dashed var(--brand); color:var(--brand); }

        /* STORY MODAL */
        .story-modal { position:fixed; inset:0; background:#000; z-index:800; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .story-modal-img { max-width:100%; max-height:80vh; object-fit:contain; border-radius:12px; }
        .story-modal-bar { position:absolute; top:0; left:0; right:0; height:3px; background:rgba(255,255,255,.3); }
        .story-modal-bar-fill { height:100%; background:#fff; animation:storyProgress 4s linear forwards; }
        @keyframes storyProgress { from{width:0} to{width:100%} }
        .story-modal-name { position:absolute; top:20px; left:16px; color:#fff; font-weight:700; font-size:.95rem; display:flex; align-items:center; gap:8px; }
        .story-modal-name img { width:36px; height:36px; border-radius:50%; object-fit:cover; border:2px solid #fff; }
        .story-modal-close { position:absolute; top:12px; right:12px; color:#fff; background:none; border:none; font-size:1.5rem; cursor:pointer; padding:8px; }
        .story-modal-nav { position:absolute; inset:0; display:flex; }
        .story-nav-prev { flex:1; }
        .story-nav-next { flex:1; }

        /* SKELETON */
        .skeleton { background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:12px; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
        .skeleton-card { border-radius:28px; overflow:hidden; margin-bottom:20px; }

        /* POST CARD — feed de momentos */
        .post-card { background:#fff; border-radius:24px; margin-bottom:20px; border:1px solid #f0f0f0; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,.04); }

        /* cabeçalho do post: avatar + nome + tempo */
        .post-header { display:flex; align-items:center; gap:10px; padding:12px 14px 10px; }
        .post-avatar { width:40px; height:40px; border-radius:50%; object-fit:cover; border:2px solid var(--brand); flex-shrink:0; background:#fed7aa; cursor:pointer; }
        .post-author-info { flex:1; min-width:0; }
        .post-author-name { font-size:.88rem; font-weight:700; color:var(--text); display:flex; align-items:center; gap:6px; }
        .post-author-sub { font-size:.72rem; color:var(--muted); }
        .post-more-btn { background:none; border:none; color:var(--muted); font-size:1.1rem; cursor:pointer; padding:8px; min-width:36px; min-height:36px; display:flex; align-items:center; justify-content:center; border-radius:50%; }

        /* imagem/vídeo do post */
        .post-media { width:100%; aspect-ratio:1/1; object-fit:cover; background:#e2e8f0; display:block; cursor:pointer; }
        .post-media-wrap { position:relative; }
        .post-video-play { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
        .post-video-play i { font-size:2.5rem; color:rgba(255,255,255,.85); filter:drop-shadow(0 2px 8px rgba(0,0,0,.4)); }

        /* barra de ações */
        .post-actions { display:flex; align-items:center; gap:4px; padding:10px 14px 4px; }
        .act-btn { background:none; border:none; font-size:1.35rem; cursor:pointer; display:flex; align-items:center; gap:5px; color:#64748b; font-weight:500; transition:color .15s,transform .1s; min-height:44px; padding:0 6px; }
        .act-count { font-size:.82rem; font-weight:700; }
        .act-btn:active { transform:scale(.82); }
        .act-btn:disabled { opacity:.5; cursor:not-allowed; }
        .act-btn.liked { color:var(--brand2); }
        .act-btn.liked i { animation:heartPop .3s ease; }
        @keyframes heartPop { 0%{transform:scale(1)} 50%{transform:scale(1.6)} 100%{transform:scale(1)} }
        .act-btn-share { margin-left:auto; }

        /* likes count + legenda */
        .post-likes { padding:0 14px 4px; font-size:.82rem; font-weight:700; color:var(--text); }
        .post-caption { padding:0 14px 8px; font-size:.83rem; line-height:1.45; color:var(--text); }
        .post-caption .cap-author { font-weight:700; margin-right:4px; }

        /* badges inline */
        .badge { border-radius:40px; padding:3px 9px; font-size:.65rem; font-weight:700; }
        .badge-v { background:#dcfce7; color:#15803d; }
        .badge-nv { background:#ffe4e2; color:#b91c1c; }
        .badge-a { background:#d1fae5; color:#065f46; }

        /* adoção no post */
        .adopt-banner { background:linear-gradient(135deg,#d1fae5,#a7f3d0); border-radius:16px; padding:8px 14px; margin:0 14px 10px; font-size:.78rem; color:#065f46; display:flex; align-items:center; gap:8px; }

        /* comentários */
        .post-comments-preview { padding:0 14px 4px; }
        .post-see-comments { background:none; border:none; font-size:.78rem; color:var(--muted); cursor:pointer; padding:0; font-family:inherit; }
        .comments-box { padding:8px 14px 4px; display:none; border-top:1px solid #f0f0f0; margin-top:4px; }
        .comment-item { font-size:.8rem; line-height:1.4; margin-bottom:6px; }
        .comment-item .ci-author { font-weight:700; margin-right:4px; }
        .ci-time { font-size:.68rem; color:var(--muted); margin-left:4px; }
        .add-cmt { display:flex; align-items:center; gap:8px; padding:8px 14px 12px; border-top:1px solid #f5f5f5; }
        .add-cmt-avatar { width:28px; height:28px; border-radius:50%; object-fit:cover; border:1.5px solid var(--brand); flex-shrink:0; background:#fed7aa; }
        .add-cmt input { flex:1; padding:8px 14px; border-radius:40px; border:1.5px solid #e2e8f0; font-family:inherit; font-size:.8rem; outline:none; background:#f8fafc; }
        .add-cmt input:focus { border-color:var(--brand); background:#fff; }
        .btn-cmt-send { background:none; border:none; color:var(--brand); cursor:pointer; font-weight:700; font-size:.82rem; min-height:36px; padding:0 4px; }
        .interest-btn { background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff; border:none; border-radius:40px; padding:6px 14px; font-size:.75rem; font-weight:700; cursor:pointer; min-height:36px; }

        /* INTEREST MODAL */
        .interest-modal { position:fixed; inset:0; background:rgba(0,0,0,.65); display:flex; align-items:center; justify-content:center; z-index:600; }
        .interest-box { background:#fff; border-radius:32px; padding:28px 24px; width:300px; text-align:center; }
        .interest-box h3 { font-size:1.1rem; font-weight:800; margin-bottom:8px; }
        .interest-box p { font-size:.83rem; color:var(--muted); margin-bottom:20px; }
        .interest-options { display:flex; flex-direction:column; gap:10px; }
        .int-opt { padding:12px; border-radius:40px; border:1.5px solid #e2e8f0; font-family:inherit; font-size:.88rem; font-weight:600; cursor:pointer; background:#fff; transition:background .15s,border-color .15s; }
        .int-opt:hover { background:#fff8f0; border-color:var(--brand); }
        .int-opt.primary { background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff; border:none; }

        /* MATCH */
        .match-actions { display:flex; justify-content:center; gap:24px; margin-top:18px; }
        .m-pass,.m-like { border:none; border-radius:50%; width:64px; height:64px; font-size:1.5rem; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 16px rgba(0,0,0,.12); transition:transform .15s; }
        .m-pass { background:#fff; color:#94a3b8; }
        .m-like { background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff; }
        .m-pass:active,.m-like:active { transform:scale(.86); }

        /* MATCH POPUP */
        .match-popup { position:fixed; inset:0; background:rgba(0,0,0,.88); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:500; animation:popIn .3s ease; }
        @keyframes popIn { from{opacity:0;transform:scale(.9)} to{opacity:1;transform:scale(1)} }
        .match-popup-title { font-size:2rem; font-weight:900; background:linear-gradient(135deg,#fbbf24,var(--brand)); background-clip:text; -webkit-background-clip:text; color:transparent; margin-bottom:6px; }
        .match-popup-sub { color:rgba(255,255,255,.75); font-size:.88rem; margin-bottom:20px; }
        .match-popup-avatars { display:flex; gap:16px; margin-bottom:24px; }
        .match-popup-avatar { width:88px; height:88px; border-radius:50%; object-fit:cover; border:3px solid var(--brand); }
        .match-popup-go { background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff; border:none; border-radius:40px; padding:13px 34px; font-size:.95rem; font-weight:700; cursor:pointer; margin-bottom:10px; }
        .match-popup-skip { color:rgba(255,255,255,.45); font-size:.8rem; cursor:pointer; background:none; border:none; }

        /* EXPLORE */
        .search-bar { display:flex; align-items:center; gap:10px; background:#f1f5f9; border-radius:40px; padding:10px 16px; margin-bottom:18px; }
        .search-bar i { color:var(--muted); }
        .search-bar input { flex:1; background:none; border:none; font-family:inherit; font-size:.88rem; outline:none; }
        .explore-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
        .explore-card { border-radius:20px; overflow:hidden; position:relative; cursor:pointer; aspect-ratio:.85; box-shadow:0 2px 8px rgba(0,0,0,.08); }
        .explore-card img { width:100%; height:100%; object-fit:cover; }
        .explore-over { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 100%); padding:16px 12px 12px; color:#fff; }
        .explore-name { font-weight:700; font-size:.88rem; }
        .explore-breed { font-size:.7rem; opacity:.8; }

        /* PROFILE */
        .profile-hdr { display:flex; align-items:center; gap:20px; margin-bottom:18px; }
        .profile-av { width:88px; height:88px; border-radius:50%; background:#fed7aa; overflow:hidden; position:relative; cursor:pointer; border:2.5px solid var(--brand); flex-shrink:0; }
        .profile-av img { width:100%; height:100%; object-fit:cover; }
        .cam-edit { position:absolute; bottom:2px; right:2px; background:var(--brand); border-radius:50%; width:26px; height:26px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:.65rem; }
        .stats { display:flex; gap:16px; flex:1; justify-content:space-around; }
        .stat { text-align:center; }
        .stat-n { font-size:1.1rem; font-weight:800; color:var(--text); display:block; }
        .stat-l { font-size:.65rem; color:var(--muted); font-weight:500; }
        .edit-btn { width:100%; background:#f1f5f9; border:none; font-size:.82rem; padding:9px; border-radius:20px; color:var(--text); cursor:pointer; font-weight:600; margin:10px 0; min-height:44px; }
        .media-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:3px; margin-top:4px; }
        .media-item { aspect-ratio:1; background:#f1f5f9; border-radius:8px; overflow:hidden; position:relative; cursor:pointer; }
        .media-item img,.media-item video { width:100%; height:100%; object-fit:cover; }
        .vid-over { position:absolute; inset:0; background:rgba(0,0,0,.25); display:flex; align-items:center; justify-content:center; color:#fff; font-size:1.5rem; pointer-events:none; }
        .del-btn { position:absolute; top:4px; right:4px; background:rgba(0,0,0,.55); color:#fff; border:none; border-radius:50%; width:24px; height:24px; cursor:pointer; z-index:2; font-size:.65rem; display:flex; align-items:center; justify-content:center; }
        .add-media-btn { background:linear-gradient(135deg,var(--brand),var(--brand2)); border:none; color:#fff; width:44px; height:44px; border-radius:50%; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .logout-btn { background:none; border:1.5px solid #e2e8f0; border-radius:40px; padding:7px 18px; font-size:.78rem; color:var(--muted); cursor:pointer; font-weight:600; min-height:44px; }

        /* UPLOAD PROGRESS */
        .upload-progress { background:#f8fafc; border-radius:16px; padding:12px 16px; margin-bottom:12px; display:none; }
        .upload-progress-bar { height:4px; background:#e2e8f0; border-radius:40px; overflow:hidden; margin-top:8px; }
        .upload-progress-fill { height:100%; background:linear-gradient(135deg,var(--brand),var(--brand2)); border-radius:40px; transition:width .3s; }
        .upload-thumb { width:40px; height:40px; border-radius:8px; object-fit:cover; }

        /* CHAT */
        .conv-list { display:flex; flex-direction:column; gap:10px; }
        .conv-item { display:flex; align-items:center; gap:12px; background:#fff; padding:12px; border-radius:20px; border:1px solid #f0f0f0; cursor:pointer; min-height:44px; }
        .conv-av { width:48px; height:48px; border-radius:50%; object-fit:cover; background:#fed7aa; flex-shrink:0; }
        .conv-name { font-weight:700; font-size:.88rem; }
        .conv-last { font-size:.73rem; color:var(--muted); margin-top:2px; }
        .chat-wrap { display:flex; flex-direction:column; height:100%; }
        .chat-hdr { display:flex; align-items:center; gap:10px; padding-bottom:12px; border-bottom:1px solid var(--border); margin-bottom:8px; }
        .chat-av { width:36px; height:36px; border-radius:50%; object-fit:cover; }
        .chat-msgs { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:8px; padding-bottom:8px; }
        .msg { max-width:78%; padding:9px 14px; border-radius:20px; background:#f1f5f9; font-size:.85rem; line-height:1.4; }
        .msg.me { align-self:flex-end; background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff; }
        .msg small { display:block; font-size:.65rem; margin-top:4px; opacity:.6; }
        .msg-status { font-size:.6rem; opacity:.6; margin-left:4px; }
        .chat-input-row { display:flex; gap:8px; padding-top:10px; border-top:1px solid #edf2f7; }
        .chat-input-row input { flex:1; padding:11px 16px; border-radius:40px; border:1.5px solid #e2e8f0; font-family:inherit; font-size:.85rem; outline:none; }
        .chat-input-row input:focus { border-color:var(--brand); }
        .send-btn { background:linear-gradient(135deg,var(--brand),var(--brand2)); border:none; border-radius:40px; padding:0 18px; color:#fff; cursor:pointer; font-weight:700; font-size:1rem; min-height:44px; }

        /* MISC */
        .back-link { background:none; border:none; font-size:.88rem; color:var(--brand); margin-bottom:14px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; font-weight:600; min-height:44px; }

function initAuth() {
    const btnSubmit = document.getElementById('btnSubmit');
    const btnGoogle  = document.getElementById('btnGoogle');
    const toggle     = document.getElementById('authToggle');
    const nameField  = document.getElementById('nameField');
    const errDiv     = document.getElementById('authErr');

    toggle.onclick = () => {
        isSignUp = !isSignUp;
        btnSubmit.textContent = isSignUp ? 'Criar conta' : 'Entrar';
        nameField.style.display = isSignUp ? 'block' : 'none';
        toggle.textContent = isSignUp ? 'Entrar' : 'Cadastre-se';
        toggle.previousSibling.textContent = isSignUp ? 'Já tem conta? ' : 'Não tem conta? ';
        errDiv.textContent = '';
    };

    btnSubmit.onclick = async () => {
        const email = document.getElementById('authEmail').value.trim();
        const pass  = document.getElementById('authPassword').value;
        const name  = document.getElementById('authName').value.trim() || 'Meu Pet';
        errDiv.textContent = '';
        if (!email || !pass) { errDiv.textContent = 'Preencha email e senha.'; return; }

        btnSubmit.disabled = true;
        btnSubmit.textContent = 'Aguarde...';

        if (isSignUp) {
            const { data, error } = await sb.auth.signUp({
                email, password: pass,
                options: { data: { full_name: name } }
            });
            if (error) { errDiv.textContent = errMsg(error.code || error.message); }
            else if (data.user && !data.session) {
                errDiv.style.color = 'var(--green)';
                errDiv.textContent = '✓ Confirme seu email e volte para entrar!';
            }
        } else {
            const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
            if (error) { errDiv.textContent = errMsg(error.code || error.message); }
        }

        btnSubmit.disabled = false;
        btnSubmit.textContent = isSignUp ? 'Criar conta' : 'Entrar';
    };

    btnGoogle.onclick = async () => {
        const { error } = await sb.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.href }
        });
        if (error) toast('Erro no login com Google: ' + error.message);
    };

    sb.auth.onAuthStateChange(async (event, session) => {
        if (session?.user) {
            currentUser = session.user;
            enterApp();
        } else {
            currentUser = null;
            showAuthScreen();
        }
    });
}

async function loadSocialData() {

    const { data: likesData } = await sb.from('post_likes')
        .select('post_id').eq('user_id', currentUser.id);
    userLikes = new Set((likesData || []).map(l => l.post_id));

    // Matches (continua por pet)
    const { data: matchData } = await sb.from('matches')
        .select('pet_id').eq('user_id', currentUser.id);
    userMatches = new Set((matchData || []).map(m => m.pet_id));

    const { data: msgsData } = await sb.from('messages')
        .select('*').eq('sender_id', currentUser.id)
        .order('created_at', { ascending: true });
    conversations = {};
    for (const m of (msgsData || [])) {
        if (!conversations[m.pet_id]) conversations[m.pet_id] = [];
        conversations[m.pet_id].push({ text: m.text, fromMe: true, ts: m.created_at });
    }
}

function timeAgo(iso) {
    if (!iso) return '';
    const diff = Date.now() - new Date(iso).getTime();
    const m = Math.floor(diff / 60000);
    if (m < 1)  return 'agora';
    if (m < 60) return `há ${m}min`;
    const h = Math.floor(m / 60);
    if (h < 24) return `há ${h}h`;
    const d = Math.floor(h / 24);
    return d === 1 ? 'ontem' : `há ${d}d`;
}

// ============================================================
// SUPABASE STORAGE — upload com progresso simulado
// ============================================================
const MAX_FILE_SIZE = 10 * 1024 * 1024; // 10MB
const ALLOWED_IMAGE_TYPES = ['image/jpeg','image/png','image/webp','image/gif'];
const ALLOWED_VIDEO_TYPES = ['video/mp4','video/webm','video/ogg'];

function validateFile(file, allowVideo = false) {
    const allowed = allowVideo ? [...ALLOWED_IMAGE_TYPES, ...ALLOWED_VIDEO_TYPES] : ALLOWED_IMAGE_TYPES;
    if (!allowed.includes(file.type)) {
        throw new Error('Formato não suportado. Use JPG, PNG, WebP' + (allowVideo ? ', MP4 ou WebM' : '') + '.');
    }
    if (file.size > MAX_FILE_SIZE) {
        throw new Error('Arquivo muito grande. Máximo 10MB.');
    }
}

async function uploadFile(file, path, onProgress) {
    const { data, error } = await sb.storage.from('dogs-media').upload(path, file, { upsert: true });
    if (error) throw error;
    if (onProgress) onProgress(100);
    const { data: urlData } = sb.storage.from('dogs-media').getPublicUrl(path);
    return urlData.publicUrl;
}

            badge.textContent = unread > 9 ? '9+' : unread;
            chatNav.querySelector('i').appendChild(badge);
        }
    }
}

// ============================================================
// HEADER
// ============================================================
function renderHeader() {
    const c = document.getElementById('hdrActions');
    const logoEl = document.querySelector('.logo');
    if (logoEl) logoEl.textContent = '🐾 Patas';

    if (['feed','explore'].includes(view)) {
        c.innerHTML = `
            <button class="icon-btn" id="hChat" aria-label="Mensagens">
                <i class="fas fa-comment-dots" aria-hidden="true"></i>
                ${userMatches.size > 0 ? '<span class="notif-dot" aria-hidden="true"></span>' : ''}
            </button>
            <img class="u-avatar" id="hProf"
                src="${esc(userProfile.avatar_url) || 'https://via.placeholder.com/28'}"
                onerror="this.src='https://via.placeholder.com/28'"
                alt="Meu perfil">`;
        document.getElementById('hChat').onclick = () => { view = 'chatList'; render(); };
        document.getElementById('hProf').onclick  = () => { view = 'profile'; render(); };
    } else if (['chatList','petProfile'].includes(view)) {
        c.innerHTML = `<button class="icon-btn" id="hBack" aria-label="Voltar"><i class="fas fa-arrow-left" aria-hidden="true"></i></button>`;
        document.getElementById('hBack').onclick = () => { view = 'feed'; render(); };
    } else if (view === 'chatDetail') {
        c.innerHTML = `<button class="icon-btn" id="hBack" aria-label="Voltar"><i class="fas fa-arrow-left" aria-hidden="true"></i></button>`;
        document.getElementById('hBack').onclick = () => { view = 'chatList'; render(); };
    } else {
        c.innerHTML = '';
    }
}

// ============================================================
// RENDER
// ============================================================
function render() {
    renderHeader();
    setActiveNav();
    const mc = document.getElementById('mainContent');
    switch(view) {
        case 'feed':       mc.innerHTML = buildFeed();       afterFeed();       break;
        case 'explore':    mc.innerHTML = buildExplore();    afterExplore();    break;
        case 'match':      mc.innerHTML = buildMatch();      afterMatch();      break;
        case 'profile':    mc.innerHTML = buildProfile();    afterProfile();    break;
        case 'petProfile': mc.innerHTML = buildPetProfile(); afterPetProfile(); break;
        case 'chatList':   mc.innerHTML = buildChatList();   afterChatList();   break;
        case 'chatDetail': mc.innerHTML = buildChatDetail(); afterChatDetail(); break;
    }
}

// ============================================================
// FEED — posts de momentos (estilo Instagram)
// ============================================================
function buildFeed() {
    // usa fallback se não houver posts do Supabase
    if (!postsData.length) postsData = JSON.parse(JSON.stringify(POSTS_FALLBACK));

    let h = '';

    // Stories
    h += `<div class="stories" role="list" aria-label="Stories">
        <div class="story" id="addStory" role="listitem">
            <div class="add-story-btn" aria-hidden="true"><i class="fas fa-plus"></i></div>
            <span class="story-name">Sua foto</span>
        </div>
        ${petsData.map(p => `
            <div class="story" data-spid="${esc(p.id)}" role="listitem" aria-label="Story de ${esc(p.name)}">
                <div class="story-ring ${seenStories.has(p.id) ? 'seen' : 'unseen'}">
                    <div class="story-inner">
                        <img src="${esc(p.img_url)||''}" loading="lazy" alt="${esc(p.name)}" onerror="this.src='https://via.placeholder.com/60'">
                    </div>
                </div>
                <span class="story-name">${esc(p.name)}</span>
            </div>`).join('')}
    </div>`;

    // Posts
    for (const post of postsData) h += buildPostCard(post);

    h += `<footer>🐾 Patas — compartilhe momentos</footer>`;
    return h;
}

function buildPostCard(post) {
    const liked = userLikes.has(post.id);
    const cmts  = post.comments || [];
    const inProgress = postsInFlight.has(post.id);
    const userAv = userProfile.avatar_url || 'https://via.placeholder.com/28';

    return `
    <article class="post-card" data-postid="${esc(post.id)}" aria-label="Post de ${esc(post.petName)}">

        <!-- Header: avatar + nome (clicável → perfil) -->
        <div class="post-header" style="cursor:pointer" data-act="viewpet" data-petid="${esc(post.petId)}">
            <img class="post-avatar" src="${esc(post.petAvatar)}" onerror="this.src='https://via.placeholder.com/40'" alt="${esc(post.petName)}">
            <div class="post-author-info">
                <div class="post-author-name">
                    ${esc(post.petName)}
                    ${post.for_adoption ? '<span class="badge badge-a">🏠 Adoção</span>' : ''}
                </div>
                <div class="post-author-sub">${post.location ? esc(post.location) + ' · ' : ''}${esc(post.time)}</div>
            </div>
            <button class="post-more-btn" data-act="more" data-id="${esc(post.id)}" aria-label="Mais opções" onclick="event.stopPropagation()"><i class="fas fa-ellipsis-h"></i></button>
        </div>

        <!-- Mídia — foto/vídeo do post (sem rótulo de nome/raça) -->
        <div class="post-media-wrap">
            ${post.mediaType === 'video'
                ? `<video class="post-media" src="${esc(post.mediaUrl)}" controls preload="metadata" aria-label="Vídeo de ${esc(post.petName)}"></video>`
                : `<img class="post-media" src="${esc(post.mediaUrl)}" loading="lazy" onerror="this.src='https://via.placeholder.com/400'" alt="Post de ${esc(post.petName)}">`}
        </div>

        <!-- Ações: ❤️ count · 💬 count · ✈️ · Interessado (sempre visível) -->
        <div class="post-actions">
            <button class="act-btn ${liked ? 'liked' : ''}" data-act="like" data-id="${esc(post.id)}" aria-label="${liked ? 'Remover curtida' : 'Curtir'}" ${inProgress ? 'disabled' : ''}>
                <i class="${liked ? 'fas' : 'far'} fa-heart" aria-hidden="true"></i>
                <span class="act-count">${post.likes || 0}</span>
            </button>
            <button class="act-btn" data-act="cmt" data-id="${esc(post.id)}" aria-label="Comentar">
                <i class="far fa-comment" aria-hidden="true"></i>
                <span class="act-count">${cmts.length}</span>
            </button>
            <button class="act-btn" data-act="share" data-id="${esc(post.id)}" data-name="${esc(post.petName)}" aria-label="Compartilhar">
                <i class="far fa-paper-plane" aria-hidden="true"></i>
            </button>
            <button class="interest-btn" data-act="interest" data-id="${esc(post.petId)}" data-name="${esc(post.petName)}" data-adopt="${post.for_adoption||false}" style="margin-left:auto">
                <i class="fas fa-paw" aria-hidden="true"></i> Interessado
            </button>
        </div>

        <!-- Legenda (só exibe se existir) -->
        ${post.caption ? `
        <div class="post-caption">
            <span class="cap-author">${esc(post.petName)}</span>${esc(post.caption)}
        </div>` : ''}

        <!-- Preview comentários -->
        ${cmts.length > 0 ? `
        <div class="post-comments-preview">
            ${cmts.slice(0,2).map(c=>`<div style="font-size:.8rem;margin-bottom:2px"><strong>${esc(c.author_name||'Usuário')}</strong> ${esc(c.text)}</div>`).join('')}
            ${cmts.length > 2 ? `<button class="post-see-comments" data-act="cmt" data-id="${esc(post.id)}">Ver todos os ${cmts.length} comentários</button>` : ''}
        </div>` : ''}

        <!-- Comentários expandidos -->
        <div class="comments-box" id="cmtbox-${esc(post.id)}" role="region" aria-label="Comentários">
            ${cmts.length === 0 ? '<div style="color:var(--muted);font-size:.78rem;margin-bottom:8px">Seja o primeiro a comentar 🐾</div>' :
                cmts.map(c=>`<div class="comment-item"><span class="ci-author">${esc(c.author_name||'Usuário')}</span>${esc(c.text)}<span class="ci-time">${c.created_at ? new Date(c.created_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : ''}</span></div>`).join('')}
        </div>

        <!-- Input comentário -->
        <div class="add-cmt">
            <img class="add-cmt-avatar" src="${esc(userAv)}" onerror="this.src='https://via.placeholder.com/28'" alt="Meu avatar">
            <input type="text" id="ci-${esc(post.id)}" placeholder="Adicione um comentário...">
            <button class="btn-cmt-send" data-act="cmt-send" data-id="${esc(post.id)}" aria-label="Enviar comentário">Publicar</button>
        </div>

    </article>`;
}

function afterFeed() {
    // "Sua foto" → abre modal de novo post
    document.getElementById('addStory')?.addEventListener('click', () => showNewPostModal());

    // Stories dos outros pets
    document.querySelectorAll('[data-spid]').forEach(el => {
        el.addEventListener('click', () => {
            const p = petsData.find(x => x.id === el.dataset.spid);
            if (p) openStoryModal(p);
        });
    });

    // Delegação de eventos nos posts
    document.querySelectorAll('[data-act]').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopPropagation();
            const act = btn.dataset.act;
            const id  = btn.dataset.id;
            if      (act === 'like')     toggleLike(id);
            else if (act === 'cmt') {
                const b = document.getElementById('cmtbox-'+id);
                if (b) { b.style.display = b.style.display==='block' ? 'none' : 'block'; document.getElementById('ci-'+id)?.focus(); }
            }
            else if (act === 'share')    { const post = postsData.find(x=>x.id===id); shareContent(id, post?.petName||''); }
            else if (act === 'interest') showInterestModal(btn.dataset.id, btn.dataset.name, btn.dataset.adopt==='true');
            else if (act === 'cmt-send') { const inp = document.getElementById('ci-'+id); if(inp?.value.trim()){ addComment(id,inp.value); inp.value=''; } }
            else if (act === 'viewpet')  { const found=petsData.find(x=>x.id===btn.dataset.petid); if(found){petProfileId=found.id;view='petProfile';render();} }
            else if (act === 'more')     toast('⋯ Em breve: editar, denunciar...');
        });
    });

    // post-header div também navega para perfil
    document.querySelectorAll('.post-header[data-act="viewpet"]').forEach(el => {
        el.addEventListener('click', e => {
            if (e.target.closest('button')) return; // evita disparar pelo ⋯
            const found = petsData.find(x => x.id === el.dataset.petid);
            if (found) { petProfileId = found.id; view = 'petProfile'; render(); }
        });
    });
}

// ============================================================
// STORY MODAL
// ============================================================
function openStoryModal(p) {
    seenStories.add(p.id);
    const m = document.createElement('div');
    m.className = 'story-modal';
    m.setAttribute('role', 'dialog');
    m.setAttribute('aria-modal', 'true');
    m.setAttribute('aria-label', `Story de ${p.name}`);
    m.innerHTML = `
        <div class="story-modal-bar"><div class="story-modal-bar-fill"></div></div>
        <div class="story-modal-name">
            <img src="${esc(p.img_url)||''}" onerror="this.src='https://via.placeholder.com/36'" alt="${esc(p.name)}">
            ${esc(p.name)}
        </div>
        <img class="story-modal-img" src="${esc(p.img_url)||''}" alt="${esc(p.name)}, foto de perfil">
        <button class="story-modal-close" aria-label="Fechar story">✕</button>
        <div class="story-modal-nav">
            <div class="story-nav-prev" aria-label="Story anterior"></div>
            <div class="story-nav-next" aria-label="Próximo story"></div>
        </div>`;
    document.body.appendChild(m);
    const close = () => { m.remove(); render(); };
    m.querySelector('.story-modal-close').onclick = close;
    // auto-close after 4s
    const timer = setTimeout(close, 4000);
    m.querySelector('.story-nav-next').onclick = () => { clearTimeout(timer); close(); };
    m.querySelector('.story-nav-prev').onclick = () => { clearTimeout(timer); close(); };
}

// ============================================================
// INTEREST MODAL (substitui Match + Adotar)
// ============================================================
function showInterestModal(id, name, isAdoption) {
    const m = document.createElement('div');
    m.className = 'interest-modal';
    m.setAttribute('role', 'dialog');
    m.setAttribute('aria-modal', 'true');
    m.innerHTML = `
        <div class="interest-box">
            <h3>🐾 Interessado em ${esc(name)}?</h3>
            <p>O que você deseja fazer?</p>
            <div class="interest-options">
                <button class="int-opt primary" id="iMatch"><i class="fas fa-paw"></i> Dar Match (amizade)</button>
                ${isAdoption ? `<button class="int-opt" id="iAdopt"><i class="fas fa-home"></i> Quero adotar</button>` : ''}
                <button class="int-opt" id="iCancel">Cancelar</button>
            </div>
        </div>`;
    document.body.appendChild(m);
    m.querySelector('#iMatch').onclick = () => { m.remove(); doMatch(id); };
    const iAdopt = m.querySelector('#iAdopt');
    if (iAdopt) iAdopt.onclick = () => { m.remove(); openChat(id); };
    m.querySelector('#iCancel').onclick = () => m.remove();
    m.onclick = e => { if (e.target === m) m.remove(); };
}

// ============================================================
// SHARE
// ============================================================
function shareContent(id, name) {
    const url = `${location.origin}${location.pathname}?pet=${id}`;
    const title = `Conhece ${name}? Veja no Patas!`;
    if (navigator.share) {
        navigator.share({ title, url }).catch(() => {});
    } else {
        navigator.clipboard?.writeText(url);
        toast('🔗 Link copiado!');
    }
}

// EXPLORE
// ============================================================
function buildExplore() {
    const filtered = petsData.filter(p =>
        !searchQ || p.name?.toLowerCase().includes(searchQ) || p.breed?.toLowerCase().includes(searchQ)
    );
    return `
        <div class="search-bar" role="search">
            <i class="fas fa-search" aria-hidden="true"></i>
            <label for="searchInp" style="position:absolute;left:-9999px">Buscar pets</label>
            <input id="searchInp" placeholder="Buscar por nome ou raça..." value="${esc(searchQ)}" autocomplete="off">
        </div>
        ${filtered.length===0
            ? `<div class="empty"><div class="ei">🔍</div><p>Nenhum resultado para "${esc(searchQ)}"</p></div>`
            : `<div class="sec-title">🐕 ${filtered.length} pets</div>
               <div class="explore-grid">
               ${filtered.map(p=>`
                   <div class="explore-card" data-epid="${esc(p.id)}" tabindex="0" role="button" aria-label="${esc(p.name)}, ${esc(p.age)}">
                       <img src="${esc(p.img_url)}" onerror="this.src='https://via.placeholder.com/200'" loading="lazy" alt="${esc(p.name)}, foto de perfil">
                       <div class="explore-over">
                           <div class="explore-name">${esc(p.name)}, ${esc(p.age)}</div>
                           <div class="explore-breed">${esc(p.breed)}${p.for_adoption?' • 🏠':''}</div>
                       </div>
                   </div>`).join('')}
               </div>`}
        <footer>🐾 Explore a comunidade Patas</footer>`;
}

function afterExplore() {
    const inp = document.getElementById('searchInp');
    if (inp) { inp.oninput = e => { searchQ = e.target.value.toLowerCase(); render(); }; inp.focus(); }
    document.querySelectorAll('[data-epid]').forEach(c => {
        c.onclick = () => { petProfileId = c.dataset.epid; view='petProfile'; render(); };
        c.addEventListener('keydown', e => { if(e.key==='Enter') c.click(); });
    });
}

// ============================================================
// MATCH
// ============================================================
function buildMatch() {
    const pool = petsData.filter(p => !userMatches.has(p.id));
    const p = pool[0];
    if (!p) return `<div class="empty"><div class="ei">🎉</div><p>Você já deu match com todos!</p></div>`;
    return `
        <div class="sec-title">🔥 Encontre um amigo</div>
        <div class="pet-card" style="margin-bottom:12px">
            <img class="pet-img" style="height:300px" src="${esc(p.img_url)}" onerror="this.src='https://via.placeholder.com/400'" alt="${esc(p.name)}, foto de perfil">
            <div class="pet-info">
                <div class="pet-row">
                    <strong>${esc(p.name)}, ${esc(p.age)}</strong>
                    <span class="badge ${p.vacc?'badge-v':'badge-nv'}">${p.vacc?'✓ Vacinado':'Pendente'}</span>
                </div>
                <div class="pet-sub">${esc(p.breed)} • ${esc(p.description)}</div>
                ${p.for_adoption?`<div class="adopt-banner"><i class="fas fa-home" aria-hidden="true"></i>${esc(p.adoption_desc||'Disponível para adoção')}</div>`:''}
            </div>
        </div>
        <div class="match-actions">
            <button class="m-pass" id="mPass" aria-label="Passar"><i class="fas fa-times" aria-hidden="true"></i></button>
            <button class="m-like" id="mLike" aria-label="Match"><i class="fas fa-paw" aria-hidden="true"></i></button>
        </div>
        <p style="text-align:center;font-size:.75rem;color:var(--muted);margin-top:14px">${pool.length} pets aguardando 🐾</p>`;
}

function afterMatch() {
    const pool = petsData.filter(p => !userMatches.has(p.id));
    const p = pool[0];
    document.getElementById('mLike')?.addEventListener('click', () => { if(p) doMatch(p.id); });
    document.getElementById('mPass')?.addEventListener('click', () => {
        if (p) { petsData = petsData.filter(x=>x.id!==p.id); petsData.push(p); }
        toast('😅 Próximo!'); render();
    });
}

// ============================================================
// PET PROFILE
// ============================================================
function buildPetProfile() {
    const p = petsData.find(x => x.id === petProfileId);
    if (!p) return `<div class="empty"><div class="ei">🐕</div><p>Pet não encontrado</p></div>`;
    const matched = userMatches.has(p.id);
    // posts deste pet
    const petPosts = postsData.filter(x => x.petId === p.id);
    const totalLikes = petPosts.reduce((s, x) => s + (x.likes || 0), 0);
    const totalCmts  = petPosts.reduce((s, x) => s + (x.comments?.length || 0), 0);
    return `
        <button class="back-link" id="bkPet"><i class="fas fa-arrow-left" aria-hidden="true"></i> Voltar</button>
        <div class="profile-hdr">
            <div class="profile-av">
                <img src="${esc(p.img_url)||''}" onerror="this.src='https://via.placeholder.com/88'" alt="${esc(p.name)}, foto de perfil">
            </div>
            <div class="stats">
                <div class="stat"><span class="stat-n">${petPosts.length}</span><span class="stat-l">posts</span></div>
                <div class="stat"><span class="stat-n">${totalLikes}</span><span class="stat-l">curtidas</span></div>
                <div class="stat"><span class="stat-n">${totalCmts}</span><span class="stat-l">coments</span></div>
            </div>
        </div>
        <strong>${esc(p.name)}</strong>${p.age ? ' • ' + esc(p.age) : ''}${p.breed ? ' • ' + esc(p.breed) : ''}
        ${p.vacc !== undefined ? `<span class="badge ${p.vacc?'badge-v':'badge-nv'}" style="margin-left:6px">${p.vacc?'✓ Vacinado':'Pendente'}</span>` : ''}
        <div style="font-size:.82rem;color:var(--muted);margin:4px 0 12px">${esc(p.description||'')}</div>
        ${p.for_adoption && p.adoption_desc ? `<div class="adopt-banner"><i class="fas fa-home" aria-hidden="true"></i>${esc(p.adoption_desc)}</div>` : ''}
        <div style="display:flex;gap:10px;margin:14px 0 18px">
            <button class="interest-btn" id="ppInterest" style="${matched?'opacity:.65':''}">
                ${matched ? '✓ Match!' : '<i class="fas fa-paw" aria-hidden="true"></i> Interessado'}
            </button>
            <button class="act-btn" id="ppChat" style="border:1.5px solid var(--border);border-radius:40px;padding:0 14px;font-size:.8rem;font-weight:700">
                <i class="fas fa-comment-dots" aria-hidden="true"></i> Mensagem
            </button>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <h4 style="font-size:.88rem;font-weight:800">📸 Posts</h4>
        </div>
        <div class="media-grid" role="list" aria-label="Posts de ${esc(p.name)}">
            ${petPosts.map(post => `
                <div class="media-item" data-ppid="${esc(post.id)}" role="listitem" style="cursor:pointer" aria-label="Post de ${esc(p.name)}">
                    ${post.mediaType === 'video'
                        ? `<video src="${esc(post.mediaUrl)}" preload="metadata" style="width:100%;height:100%;object-fit:cover"></video><div class="vid-over" aria-hidden="true"><i class="fas fa-play"></i></div>`
                        : `<img src="${esc(post.mediaUrl)}" loading="lazy" onerror="this.src='https://via.placeholder.com/120'" alt="Post">`}
                    <div style="position:absolute;bottom:4px;right:6px;color:#fff;font-size:.65rem;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.6)">❤️ ${post.likes||0}</div>
                </div>`).join('')}
            ${petPosts.length === 0 ? '<div style="grid-column:span 3;text-align:center;color:var(--muted);padding:24px;font-size:.8rem">Nenhum post ainda 📷</div>' : ''}
        </div>
        <footer>🐕 Perfil de ${esc(p.name)}</footer>`;
}

function afterPetProfile() {
    const p = petsData.find(x => x.id === petProfileId);
    document.getElementById('bkPet')?.addEventListener('click', () => { view='feed'; render(); });
    document.getElementById('ppInterest')?.addEventListener('click', () => {
        if (p) showInterestModal(petProfileId, p.name, p.for_adoption);
    });
    document.getElementById('ppChat')?.addEventListener('click', () => {
        if (!conversations[petProfileId]) conversations[petProfileId] = [];
        chatPetId = petProfileId; view = 'chatDetail'; render();
    });
    // Clicar num post do grid abre o feed no post (futura deep-link; por ora scrolla para ele no feed)
    document.querySelectorAll('[data-ppid]').forEach(el => {
        el.addEventListener('click', () => {
            view = 'feed'; render();
            setTimeout(() => {
                const el2 = document.querySelector(`[data-postid="${el.dataset.ppid}"]`);
                if (el2) el2.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        });
    });
}

// PROFILE PRÓPRIO

        <strong>${esc(p.name||'')}</strong>${p.age?' • '+esc(p.age):''}${p.breed?' • '+esc(p.breed):''}

        <div style="font-size:.82rem;color:var(--muted);margin:4px 0 10px">${esc(p.bio||'').replace(/\n/g,'<br>')}</div>
        ${p.is_for_adoption&&p.adoption_description?`<div class="adopt-banner"><i class="fas fa-paw" aria-hidden="true"></i>${esc(p.adoption_description)}</div>`:''}
        <button class="edit-btn" id="editBtn"><i class="fas fa-pen" aria-hidden="true"></i> Editar perfil</button>
        <div id="uploadProgressBar" class="upload-progress">
            <div style="display:flex;align-items:center;gap:10px"><div class="spinner"></div><span id="uploadLabel" style="font-size:.83rem">Enviando...</span></div>
            <div class="upload-progress-bar"><div class="upload-progress-fill" id="uploadFill" style="width:0%"></div></div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin:14px 0 10px">
            <h4 style="font-size:.88rem;font-weight:800">📸 Meus posts</h4>
            <button class="add-media-btn" id="addMedia" aria-label="Novo post"><i class="fas fa-plus" aria-hidden="true"></i></button>
        </div>
        <div class="media-grid" role="list" aria-label="Minha galeria">
            ${myPosts.map((post,i)=>`
                <div class="media-item" role="listitem">
                    ${post.mediaType==='video'
                        ? `<video src="${esc(post.mediaUrl)}" preload="metadata" style="width:100%;height:100%;object-fit:cover"></video><div class="vid-over" aria-hidden="true"><i class="fas fa-play"></i></div>`
                        : `<img src="${esc(post.mediaUrl)}" loading="lazy" onerror="this.src='https://via.placeholder.com/120'" alt="Meu post ${i+1}">`}
                    <div style="position:absolute;bottom:4px;right:6px;color:#fff;font-size:.65rem;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.6)">❤️ ${post.likes||0}</div>
                    <button class="del-btn" data-delpost="${esc(post.id)}" aria-label="Remover post"><i class="fas fa-times" aria-hidden="true"></i></button>
                </div>`).join('')}
            ${myPosts.length===0?'<div style="grid-column:span 3;text-align:center;color:var(--muted);padding:20px;font-size:.8rem">➕ Compartilhe um momento</div>':''}
        </div>
        <div style="margin-top:20px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:center">
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt" aria-hidden="true"></i> Sair da conta</button>
        </div>
        <footer>🐕 Patas • Supabase</footer>`;
}

function showUploadProgress(label, percent) {
    const bar = document.getElementById('uploadProgressBar');
    const lbl = document.getElementById('uploadLabel');
    const fill = document.getElementById('uploadFill');
    if (bar) bar.style.display = 'block';
    if (lbl) lbl.textContent = label;
    if (fill) fill.style.width = percent + '%';
}
function hideUploadProgress() {
    const bar = document.getElementById('uploadProgressBar');
    if (bar) bar.style.display = 'none';
}

function afterProfile() {
    const avArea = document.getElementById('avArea');
    const avFile = document.getElementById('avFile');
    avArea.onclick = () => avFile.click();
    avArea.addEventListener('keydown', e => { if(e.key==='Enter') avFile.click(); });
    avFile.onchange = async e => {
        const f = e.target.files[0];
        if (!f) return;
        try {
            validateFile(f, false);
        } catch(err) { toast('❌ ' + err.message); return; }
        showUploadProgress('Enviando foto...', 30);
        try {
            showUploadProgress('Enviando foto...', 60);
            const url = await uploadFile(f, `avatars/${currentUser.id}_${Date.now()}`);
            showUploadProgress('Concluído!', 100);
            await sb.from('profiles').update({ avatar_url: url }).eq('id', currentUser.id);
            userProfile.avatar_url = url;
            toast('Avatar atualizado! 🐾');
            setTimeout(() => { hideUploadProgress(); render(); }, 600);
        } catch(err) { hideUploadProgress(); toast('Erro no upload: ' + err.message); }
    };

    document.getElementById('editBtn').onclick = showEditModal;

    document.getElementById('addMedia').onclick = () => showNewPostModal();

    document.querySelectorAll('[data-delpost]').forEach(btn => {
        btn.onclick = async e => {
            e.stopPropagation();
            if (!confirm('Remover post?')) return;
            const postId = btn.dataset.delpost;
            await sb.from('posts').delete().eq('id', postId);
            postsData = postsData.filter(x => x.id !== postId);
            toast('Post removido');
            render();
        };
    });

    document.getElementById('logoutBtn').onclick = async () => {
        if (!confirm('Sair da conta?')) return;
        await sb.auth.signOut();
    };
}

function showEditModal() {
    const p = userProfile;
    const m = document.createElement('div');
    m.className = 'modal-bg';
    m.setAttribute('role', 'dialog');
    m.setAttribute('aria-modal', 'true');
    m.setAttribute('aria-label', 'Editar perfil');
    m.innerHTML = `
        <div class="modal-box">
            <h3>✏️ Editar perfil</h3>
            <label for="eN">Nome do pet</label><input id="eN" value="${esc(p.name||'')}" autocomplete="off">
            <label for="eA">Idade</label><input id="eA" value="${esc(p.age||'')}">
            <label for="eB">Raça</label><input id="eB" value="${esc(p.breed||'')}">
            <label for="eBio">Bio</label><textarea id="eBio" rows="3">${esc(p.bio||'')}</textarea>
            <label class="chk-label"><input type="checkbox" id="eAdopt" ${p.is_for_adoption?'checked':''}> Disponível para adoção</label>
            <div id="adoptGrp" style="${p.is_for_adoption?'':'display:none'}">
                <label for="eAdoptDesc">Descrição para adoção</label>
                <textarea id="eAdoptDesc" rows="2">${esc(p.adoption_description||'')}</textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="mCancel">Cancelar</button>
                <button class="btn-save" id="mSave">Salvar</button>
            </div>
        </div>`;
    document.body.appendChild(m);
    m.querySelector('#eAdopt').onchange = e => {
        m.querySelector('#adoptGrp').style.display = e.target.checked ? '' : 'none';
    };
    m.querySelector('#mSave').onclick = async () => {
        const updates = {
            name: m.querySelector('#eN').value,
            age: m.querySelector('#eA').value,
            breed: m.querySelector('#eB').value,
            bio: m.querySelector('#eBio').value,
            is_for_adoption: m.querySelector('#eAdopt').checked,
            adoption_description: m.querySelector('#eAdoptDesc').value
        };
        const { error } = await sb.from('profiles').update(updates).eq('id', currentUser.id);
        if (error) { toast('Erro ao salvar: ' + error.message); return; }
        Object.assign(userProfile, updates);
        toast('Perfil atualizado! 🐾');
        m.remove();
        render();
    };
    m.querySelector('#mCancel').onclick = () => m.remove();
    m.onclick = e => { if(e.target===m) m.remove(); };
    // Focus first input
    setTimeout(() => m.querySelector('#eN')?.focus(), 50);
}

// ============================================================
// CHAT LIST
// ============================================================
function buildChatList() {
    const ids = new Set([...Object.keys(conversations), ...[...userMatches]]);
    const pets = [...ids].map(id => petsData.find(p=>p.id===id)).filter(Boolean);
    if (!pets.length) return `<div class="empty"><div class="ei">💬</div><p>Nenhuma conversa ainda.<br>Dê match com um pet!</p></div>`;
    return `<div class="sec-title">💬 Conversas</div>
        <div class="conv-list" role="list">
        ${pets.map(p => {
            const msgs = conversations[p.id]||[];
            const last = msgs.length ? msgs[msgs.length-1].text.substring(0,40) : 'Iniciar conversa';
            return `<div class="conv-item" data-cpid="${esc(p.id)}" role="listitem" tabindex="0" aria-label="Conversa com ${esc(p.name)}">
                <img class="conv-av" src="${esc(p.img_url)}" onerror="this.src='https://via.placeholder.com/48'" alt="${esc(p.name)}">
                <div><div class="conv-name">${esc(p.name)}</div><div class="conv-last">${esc(last)}</div></div>
            </div>`;
        }).join('')}
        </div>`;
}

function afterChatList() {
    document.querySelectorAll('[data-cpid]').forEach(el => {
        el.onclick = () => { chatPetId = el.dataset.cpid; view='chatDetail'; render(); };
        el.addEventListener('keydown', e => { if(e.key==='Enter') el.click(); });
    });
}

// ============================================================
// CHAT DETAIL
// ============================================================
function buildChatDetail() {
    const p = petsData.find(x=>x.id===chatPetId);
    if (!p) return `<div class="empty"><div class="ei">🐕</div><p>Pet não encontrado</p></div>`;
    const msgs = conversations[chatPetId]||[];
    return `<div class="chat-wrap" role="main">
        <div class="chat-hdr">
            <img class="chat-av" src="${esc(p.img_url)}" onerror="this.src='https://via.placeholder.com/36'" alt="${esc(p.name)}">
            <strong style="font-size:.9rem">${esc(p.name)}</strong>
            ${p.for_adoption?'<span class="badge badge-a" style="margin-left:auto">🏠 Adoção</span>':''}
        </div>
        <div class="chat-msgs" id="chatMsgs" role="log" aria-live="polite" aria-label="Mensagens">
            ${msgs.length===0?`<div class="empty" style="padding:20px"><div class="ei">🐾</div><p>Diga olá para ${esc(p.name)}!</p></div>`:''}
            ${msgs.map(msg=>`<div class="msg ${msg.fromMe?'me':''}">
                ${esc(msg.text)}
                <small>${msg.ts?new Date(msg.ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):''} ${msg.fromMe?'<span class="msg-status" aria-label="Entregue">✓</span>':''}</small>
            </div>`).join('')}
        </div>
        <div class="chat-input-row">
            <label for="chatInp" style="position:absolute;left:-9999px">Mensagem para ${esc(p.name)}</label>
            <input type="text" id="chatInp" placeholder="Mensagem..." autocomplete="off">
            <button class="send-btn" id="sendBtn" aria-label="Enviar mensagem">→</button>
        </div>
    </div>`;
}

function afterChatDetail() {
    const inp = document.getElementById('chatInp');
    const send = async () => {
        const txt = inp?.value?.trim();
        if (!txt) return;
        await sb.from('messages').insert({
            sender_id: currentUser.id,
            pet_id: chatPetId,
            text: txt
        });
        if (!conversations[chatPetId]) conversations[chatPetId] = [];
        conversations[chatPetId].push({ text: txt, fromMe: true, ts: new Date().toISOString() });
        inp.value = '';
        render();
        // Auto-resposta demo
        const p = petsData.find(x=>x.id===chatPetId);
        setTimeout(() => {
            const reply = p?.for_adoption ? '🐾 Obrigado pelo interesse! Vamos conversar sobre adoção.' : `🐕 Oi! Sou ${p?.name||''}. Prazer!`;
            conversations[chatPetId].push({ text: reply, fromMe: false, ts: new Date().toISOString() });
            if (view==='chatDetail') render();
        }, 900);
    };
    document.getElementById('sendBtn')?.addEventListener('click', send);
    inp?.addEventListener('keypress', e => { if(e.key==='Enter') send(); });
    inp?.focus();
    const msgs = document.getElementById('chatMsgs');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

// ============================================================
// ACTIONS
// ============================================================
async function toggleLike(postId) {
    if (postsInFlight.has(postId)) return;
    postsInFlight.add(postId);
    render();
    try {
        const post = postsData.find(x => x.id === postId);
        if (!post) return;
        if (userLikes.has(postId)) {
            await sb.from('post_likes').delete()
                .eq('user_id', currentUser.id).eq('post_id', postId);
            await sb.rpc('increment_post_likes', { p_id: postId, delta: -1 });
            userLikes.delete(postId);
            post.likes = Math.max(0, post.likes - 1);
            toast('Curtida removida');
        } else {
            await sb.from('post_likes').insert({ user_id: currentUser.id, post_id: postId });
            await sb.rpc('increment_post_likes', { p_id: postId, delta: 1 });
            userLikes.add(postId);
            post.likes = post.likes + 1;
            if (navigator.vibrate) navigator.vibrate(50);
            toast('❤️ Curtido!');
        }
    } catch(e) {
        toast('Erro ao curtir');
    } finally {
        postsInFlight.delete(postId);
        render();
    }
}

async function doMatch(id) {
    if (userMatches.has(id)) { toast('Já deu match!'); return; }
    await sb.from('matches').insert({ user_id: currentUser.id, pet_id: id });
    userMatches.add(id);
    if (!conversations[id]) conversations[id] = [];
    const p = petsData.find(x=>x.id===id);
    if (navigator.vibrate) navigator.vibrate(200);
    showMatchPopup(p);
}

function showMatchPopup(p) {
    const el = document.createElement('div');
    el.className = 'match-popup';
    el.setAttribute('role', 'dialog');
    el.setAttribute('aria-modal', 'true');
    el.setAttribute('aria-label', 'Match!');
    const userAvatar = esc(userProfile.avatar_url||'https://via.placeholder.com/88');
    const petAvatar = esc(p.img_url||'https://via.placeholder.com/88');
    el.innerHTML = `
        <div class="match-popup-title">🎉 É um Match!</div>
        <div class="match-popup-sub">Você e ${esc(p.name)} agora podem conversar</div>
        <div class="match-popup-avatars">
            <img class="match-popup-avatar" src="${userAvatar}" onerror="this.src='https://via.placeholder.com/88'" alt="Minha foto">
            <img class="match-popup-avatar" src="${petAvatar}" onerror="this.src='https://via.placeholder.com/88'" alt="${esc(p.name)}">
        </div>
        <button class="match-popup-go" id="mpChat">Iniciar conversa 💬</button>
        <button class="match-popup-skip" id="mpSkip">Agora não</button>`;
    document.body.appendChild(el);
    document.getElementById('mpChat').onclick = () => { el.remove(); chatPetId=p.id; view='chatDetail'; render(); };
    document.getElementById('mpSkip').onclick = () => { el.remove(); render(); };
    el.onclick = e => { if(e.target===el) { el.remove(); render(); } };
}

async function addComment(postId, text) {
    const authorName = userProfile.name || 'Usuário';
    const { data } = await sb.from('post_comments').insert({
        post_id: postId,
        user_id: currentUser.id,
        author_name: authorName,
        text
    }).select().single();
    const post = postsData.find(x => x.id === postId);
    if (post) {
        if (!post.comments) post.comments = [];
        post.comments.unshift(data || { author_name: authorName, text, created_at: new Date().toISOString() });
    }
    render();
}

function openChat(id) {
    if (!conversations[id]) conversations[id] = [];
    chatPetId = id; view = 'chatDetail'; render();
}

// NOVO POST MODAL
// ============================================================
function showNewPostModal() {
    const myPet = petsData.find(p => p.user_id === currentUser?.id) || petsData[0];
    const m = document.createElement('div');
    m.className = 'modal-bg';
    m.setAttribute('role', 'dialog');
    m.setAttribute('aria-modal', 'true');
    m.setAttribute('aria-label', 'Novo post');
    m.innerHTML = `
        <div class="modal-box" style="max-height:90vh;overflow-y:auto">
            <h3>📸 Novo post</h3>
            <div id="npPreviewWrap" style="width:100%;aspect-ratio:1/1;background:#f1f5f9;border-radius:16px;overflow:hidden;margin-bottom:12px;display:flex;align-items:center;justify-content:center;cursor:pointer" id="npPreviewClick">
                <div id="npPlaceholder" style="text-align:center;color:#94a3b8">
                    <div style="font-size:2.5rem">📷</div>
                    <div style="font-size:.82rem;margin-top:6px">Toque para escolher foto ou vídeo</div>
                </div>
                <img id="npImgPreview" style="display:none;width:100%;height:100%;object-fit:cover" alt="Preview">
                <video id="npVidPreview" style="display:none;width:100%;height:100%;object-fit:cover" controls></video>
            </div>
            <input type="file" id="npFile" accept="${[...ALLOWED_IMAGE_TYPES,...ALLOWED_VIDEO_TYPES].join(',')}" style="display:none">
            <label for="npCaption" style="font-size:.8rem;font-weight:600;color:var(--muted)">Legenda</label>
            <textarea id="npCaption" rows="3" placeholder="Conte o momento... 🐾" style="width:100%;border:1.5px solid #e2e8f0;border-radius:12px;padding:10px;font-family:inherit;font-size:.85rem;outline:none;resize:vertical;margin-bottom:8px;box-sizing:border-box"></textarea>
            <label for="npLocation" style="font-size:.8rem;font-weight:600;color:var(--muted)">Local (opcional)</label>
            <input id="npLocation" placeholder="Ex: Parque da Cidade" style="width:100%;border:1.5px solid #e2e8f0;border-radius:12px;padding:10px;font-family:inherit;font-size:.85rem;outline:none;margin-bottom:14px;box-sizing:border-box">
            <div id="npProgress" class="upload-progress" style="display:none;margin-bottom:10px">
                <div style="display:flex;align-items:center;gap:10px"><div class="spinner"></div><span id="npLabel" style="font-size:.83rem">Publicando...</span></div>
                <div class="upload-progress-bar"><div class="upload-progress-fill" id="npFill" style="width:0%"></div></div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="npCancel">Cancelar</button>
                <button class="btn-save" id="npPublish" disabled>Publicar</button>
            </div>
        </div>`;
    document.body.appendChild(m);

    let selectedFile = null;
    let mediaType = 'image';

    const previewWrap = m.querySelector('#npPreviewWrap');
    previewWrap.onclick = () => m.querySelector('#npFile').click();

    m.querySelector('#npFile').onchange = e => {
        selectedFile = e.target.files[0];
        if (!selectedFile) return;
        try { validateFile(selectedFile, true); } catch(err) { toast('❌ ' + err.message); selectedFile = null; return; }
        mediaType = selectedFile.type.startsWith('image/') ? 'image' : 'video';
        const url = URL.createObjectURL(selectedFile);
        m.querySelector('#npPlaceholder').style.display = 'none';
        if (mediaType === 'image') {
            const img = m.querySelector('#npImgPreview');
            img.src = url; img.style.display = 'block';
            m.querySelector('#npVidPreview').style.display = 'none';
        } else {
            const vid = m.querySelector('#npVidPreview');
            vid.src = url; vid.style.display = 'block';
            m.querySelector('#npImgPreview').style.display = 'none';
        }
        m.querySelector('#npPublish').disabled = false;
    };

    m.querySelector('#npPublish').onclick = async () => {
        if (!selectedFile) { toast('Escolha uma foto ou vídeo'); return; }
        const caption  = m.querySelector('#npCaption').value.trim();
        const location = m.querySelector('#npLocation').value.trim();
        const prog = m.querySelector('#npProgress');
        const fill = m.querySelector('#npFill');
        const lbl  = m.querySelector('#npLabel');
        prog.style.display = 'block';
        fill.style.width = '20%'; lbl.textContent = 'Enviando mídia...';
        try {
            const mediaUrl = await uploadFile(selectedFile, `posts/${currentUser.id}/${Date.now()}`, pct => { fill.style.width = pct + '%'; });
            fill.style.width = '80%'; lbl.textContent = 'Salvando post...';
            const petId = myPet?.id || null;
            const { data, error } = await sb.from('posts').insert({
                pet_id: petId,
                user_id: currentUser.id,
                media_url: mediaUrl,
                media_type: mediaType,
                caption,
                location
            }).select().single();
            if (error) throw error;
            fill.style.width = '100%'; lbl.textContent = 'Publicado! 🎉';
            // Adiciona ao feed localmente
            postsData.unshift({
                id: data?.id || 'local_' + Date.now(),
                petId: petId,
                petName: userProfile.name || 'Você',
                petAvatar: userProfile.avatar_url || '',
                mediaUrl,
                mediaType,
                caption,
                location,
                time: 'agora',
                likes: 0,
                comments: [],
                for_adoption: userProfile.is_for_adoption || false,
                adoption_desc: userProfile.adoption_description || ''
            });
            setTimeout(() => { m.remove(); render(); toast('Post publicado! 🐾'); }, 700);
        } catch(err) {
            prog.style.display = 'none';
            toast('Erro ao publicar: ' + err.message);
        }
    };

    m.querySelector('#npCancel').onclick = () => m.remove();
    m.onclick = e => { if(e.target === m) m.remove(); };
    setTimeout(() => m.querySelector('#npCaption')?.focus(), 100);
}

initAuth();
</script>

<script>
// PWA install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    // Mostra banner assim que o usuário estiver logado (ou depois de 3s)
    const tryShow = () => { if (deferredPrompt) showInstallBanner(); };
    if (currentUser) tryShow();
    else setTimeout(tryShow, 3000);
});

function showInstallBanner() {
    if (document.getElementById('installBanner')) return;
    const banner = document.createElement('div');
    banner.id = 'installBanner';
    banner.style.cssText = [
        'position:fixed',
        'bottom:calc(72px + env(safe-area-inset-bottom, 0px) + 12px)',
        'left:50%','transform:translateX(-50%)',
        'background:#fff','border:1.5px solid #f0f0f0','border-radius:20px',
        'padding:12px 18px','z-index:500','display:flex','align-items:center',
        'gap:12px','box-shadow:0 8px 24px rgba(0,0,0,.18)','white-space:nowrap',
        'font-family:Inter,sans-serif','font-size:.82rem','max-width:calc(100vw - 32px)'
    ].join(';');
    banner.innerHTML =
        '<span style="font-size:1.4rem">🐾</span>' +
        '<div><div style="font-weight:700;color:#1e293b">Instalar Patas</div>' +
        '<div style="color:#94a3b8;font-size:.75rem">Adicionar à tela inicial</div></div>' +
        '<button id="installBtn" style="background:linear-gradient(135deg,#FF8C42,#e11d48);color:#fff;border:none;border-radius:40px;padding:7px 16px;font-weight:700;cursor:pointer;font-size:.78rem;min-height:44px">Instalar</button>' +
        '<button id="dismissBtn" style="background:none;border:none;font-size:1.1rem;cursor:pointer;color:#94a3b8;min-width:44px;min-height:44px" aria-label="Fechar">✕</button>';
    document.body.appendChild(banner);
    document.getElementById('installBtn').onclick = async () => {
        banner.remove();
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        deferredPrompt = null;
        if (outcome === 'accepted') toast('🎉 Patas instalado!');
    };
    document.getElementById('dismissBtn').onclick = () => banner.remove();
}

window.addEventListener('appinstalled', () => {
    deferredPrompt = null;
    document.getElementById('installBanner')?.remove();
    toast('🐾 Patas instalado com sucesso!');
});
</script>
