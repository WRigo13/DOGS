<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dogs · Rede social de pets</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f97316">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Dogs">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --brand:#f97316; --brand2:#e11d48; --green:#10b981;
            --bg:#f5f7fb; --card:#fff; --border:#f0f0f0;
            --text:#1e293b; --muted:#94a3b8;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg); height:100vh; overflow:hidden; display:flex; justify-content:center; align-items:center; padding:12px; }
        .app-wrap { max-width:450px; width:100%; height:100%; background:var(--card); border-radius:40px; box-shadow:0 25px 50px -12px rgba(0,0,0,.25); overflow:hidden; display:flex; flex-direction:column; position:relative; }

        /* AUTH */
        #authScreen { position:absolute; inset:0; z-index:50; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 28px; background:linear-gradient(160deg,#fff8f0 0%,#fff 60%); border-radius:40px; }
        .auth-paw { font-size:4.5rem; animation:wag 2s ease-in-out infinite; }
        @keyframes wag { 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(8deg)} }
        .auth-logo { font-size:2.4rem; font-weight:900; margin:8px 0 4px; background:linear-gradient(135deg,var(--brand),var(--brand2)); background-clip:text; -webkit-background-clip:text; color:transparent; }
        .auth-tag { font-size:.82rem; color:var(--muted); margin-bottom:32px; text-align:center; }
        .auth-inp { width:100%; padding:13px 18px; margin-bottom:10px; border-radius:40px; border:1.5px solid #e2e8f0; font-family:inherit; font-size:.9rem; outline:none; transition:border-color .2s; }
        .auth-inp:focus { border-color:var(--brand); }
        .auth-btn { width:100%; padding:14px; border-radius:40px; border:none; background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff; font-weight:700; font-size:.95rem; cursor:pointer; transition:opacity .2s,transform .1s; }
        .auth-btn:active { transform:scale(.98); }
        .auth-btn:disabled { opacity:.6; cursor:not-allowed; }
        .auth-btn.secondary { background:#fff; border:1.5px solid #e2e8f0; color:var(--text); display:flex; align-items:center; justify-content:center; gap:10px; margin-top:10px; }
        .auth-divider { display:flex; align-items:center; gap:10px; margin:14px 0; width:100%; color:var(--muted); font-size:.8rem; }
        .auth-divider::before,.auth-divider::after { content:''; flex:1; height:1px; background:#e2e8f0; }
        .auth-err { color:var(--brand2); font-size:.78rem; margin:4px 0; min-height:18px; text-align:center; }
        .auth-switch { margin-top:16px; font-size:.82rem; color:var(--muted); }
        .auth-switch a { color:var(--brand); font-weight:600; cursor:pointer; }

        /* APP SHELL */
        #appShell { display:none; flex-direction:column; height:100%; width:100%; }
        .app-header { background:#fff; padding:18px 20px 12px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
        .logo { font-size:1.7rem; font-weight:900; background:linear-gradient(135deg,var(--brand),var(--brand2)); background-clip:text; -webkit-background-clip:text; color:transparent; }
        .hdr-actions { display:flex; gap:10px; align-items:center; }
        .icon-btn { background:none; border:none; font-size:1.25rem; cursor:pointer; color:#64748b; padding:4px; position:relative; }
        .notif-dot { position:absolute; top:2px; right:2px; width:8px; height:8px; background:var(--brand2); border-radius:50%; border:2px solid #fff; }
        .u-avatar { width:28px; height:28px; border-radius:50%; object-fit:cover; border:2px solid var(--brand); cursor:pointer; }
        .main { flex:1; overflow-y:auto; padding:16px; }
        .main::-webkit-scrollbar { width:0; }
        .bottom-nav { background:rgba(255,255,255,.96); backdrop-filter:blur(10px); border-top:1px solid #edf2f7; display:flex; justify-content:space-around; padding:10px 20px 20px; flex-shrink:0; }
        .nav-btn { display:flex; flex-direction:column; align-items:center; gap:3px; font-size:.65rem; font-weight:600; color:var(--muted); background:none; border:none; cursor:pointer; transition:color .15s; }
        .nav-btn.active { color:var(--brand); }
        .nav-btn i { font-size:1.4rem; }

        /* STORIES */
        .stories { display:flex; gap:12px; overflow-x:auto; padding-bottom:4px; margin-bottom:18px; scrollbar-width:none; }
        .stories::-webkit-scrollbar { display:none; }
        .story { display:flex; flex-direction:column; align-items:center; gap:4px; flex-shrink:0; cursor:pointer; }
        .story-ring { width:60px; height:60px; border-radius:50%; background:linear-gradient(135deg,var(--brand),var(--brand2)); padding:2.5px; transition:transform .15s; }
        .story-ring.seen { background:#e2e8f0; }
        .story-ring:active { transform:scale(.92); }
        .story-inner { width:100%; height:100%; border-radius:50%; overflow:hidden; border:2.5px solid #fff; background:#fed7aa; }
        .story-inner img { width:100%; height:100%; object-fit:cover; }
        .story-name { font-size:.65rem; color:var(--text); font-weight:500; max-width:60px; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .add-story-btn { width:60px; height:60px; border-radius:50%; background:linear-gradient(135deg,#fef3c7,#fed7aa); display:flex; align-items:center; justify-content:center; font-size:1.3rem; cursor:pointer; border:2px dashed var(--brand); color:var(--brand); }

        /* PET CARD */
        .pet-card { background:#fff; border-radius:28px; margin-bottom:20px; border:1px solid #f1f1f1; overflow:hidden; cursor:pointer; transition:transform .1s; box-shadow:0 2px 12px rgba(0,0,0,.04); }
        .pet-card:active { transform:scale(.985); }
        .pet-img { width:100%; height:260px; object-fit:cover; background:#e2e8f0; display:block; }
        .pet-info { padding:14px 16px; }
        .pet-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
        .badge { border-radius:40px; padding:4px 10px; font-size:.68rem; font-weight:700; }
        .badge-v { background:#dcfce7; color:#15803d; }
        .badge-nv { background:#ffe4e2; color:#b91c1c; }
        .badge-a { background:#d1fae5; color:#065f46; }
        .pet-sub { font-size:.8rem; color:var(--muted); margin-bottom:4px; }
        .adopt-banner { background:linear-gradient(135deg,#d1fae5,#a7f3d0); border-radius:16px; padding:10px 14px; margin-top:8px; font-size:.78rem; color:#065f46; display:flex; align-items:center; gap:8px; }
        .actions { display:flex; gap:14px; margin:12px 0 8px; flex-wrap:wrap; align-items:center; }
        .act-btn { background:none; border:none; font-size:1.1rem; cursor:pointer; display:flex; align-items:center; gap:5px; color:#64748b; font-weight:500; transition:color .15s,transform .1s; }
        .act-btn:active { transform:scale(.88); }
        .act-btn.liked { color:var(--brand2); }
        .match-sm { background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff; border:none; border-radius:40px; padding:7px 16px; font-size:.78rem; font-weight:700; cursor:pointer; }
        .adopt-sm { background:none; border:1.5px solid var(--green); color:var(--green); border-radius:40px; padding:6px 14px; font-size:.78rem; font-weight:700; cursor:pointer; }
        .comments-box { margin-top:12px; border-top:1px solid #edf2f7; padding-top:12px; display:none; }
        .comment-item { background:#f8fafc; border-radius:16px; padding:8px 12px; margin-bottom:8px; font-size:.8rem; line-height:1.4; }
        .add-cmt { display:flex; gap:8px; margin-top:8px; }
        .add-cmt input { flex:1; padding:8px 14px; border-radius:40px; border:1.5px solid #e2e8f0; font-family:inherit; font-size:.8rem; outline:none; }
        .add-cmt input:focus { border-color:var(--brand); }
        .btn-cmt-send { background:var(--brand); border:none; border-radius:40px; padding:0 14px; color:#fff; cursor:pointer; font-weight:700; }

        /* MATCH */
        .match-actions { display:flex; justify-content:center; gap:24px; margin-top:18px; }
        .m-pass,.m-like { border:none; border-radius:50%; width:64px; height:64px; font-size:1.5rem; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 16px rgba(0,0,0,.12); transition:transform .15s; }
        .m-pass { background:#fff; color:#94a3b8; }
        .m-like { background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff; }
        .m-pass:active,.m-like:active { transform:scale(.86); }

        /* MATCH POPUP */
        .match-popup { position:fixed; inset:0; background:rgba(0,0,0,.88); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:500; animation:popIn .3s ease; }
        @keyframes popIn { from{opacity:0;transform:scale(.9)} to{opacity:1;transform:scale(1)} }
        .match-popup-title { font-size:2rem; font-weight:900; background:linear-gradient(135deg,#fbbf24,var(--brand)); background-clip:text; -webkit-background-clip:text; color:transparent; margin-bottom:6px; }
        .match-popup-sub { color:rgba(255,255,255,.75); font-size:.88rem; margin-bottom:20px; }
        .match-popup-avatars { display:flex; gap:16px; margin-bottom:24px; }
        .match-popup-avatar { width:88px; height:88px; border-radius:50%; object-fit:cover; border:3px solid var(--brand); }
        .match-popup-go { background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff; border:none; border-radius:40px; padding:13px 34px; font-size:.95rem; font-weight:700; cursor:pointer; margin-bottom:10px; }
        .match-popup-skip { color:rgba(255,255,255,.45); font-size:.8rem; cursor:pointer; background:none; border:none; }

        /* EXPLORE */
        .search-bar { display:flex; align-items:center; gap:10px; background:#f1f5f9; border-radius:40px; padding:10px 16px; margin-bottom:18px; }
        .search-bar i { color:var(--muted); }
        .search-bar input { flex:1; background:none; border:none; font-family:inherit; font-size:.88rem; outline:none; }
        .explore-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
        .explore-card { border-radius:20px; overflow:hidden; position:relative; cursor:pointer; aspect-ratio:.85; box-shadow:0 2px 8px rgba(0,0,0,.08); }
        .explore-card img { width:100%; height:100%; object-fit:cover; }
        .explore-over { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 100%); padding:16px 12px 12px; color:#fff; }
        .explore-name { font-weight:700; font-size:.88rem; }
        .explore-breed { font-size:.7rem; opacity:.8; }

        /* PROFILE */
        .profile-hdr { display:flex; align-items:center; gap:20px; margin-bottom:18px; }
        .profile-av { width:88px; height:88px; border-radius:50%; background:#fed7aa; overflow:hidden; position:relative; cursor:pointer; border:2.5px solid var(--brand); flex-shrink:0; }
        .profile-av img { width:100%; height:100%; object-fit:cover; }
        .cam-edit { position:absolute; bottom:2px; right:2px; background:var(--brand); border-radius:50%; width:26px; height:26px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:.65rem; }
        .stats { display:flex; gap:16px; flex:1; justify-content:space-around; }
        .stat { text-align:center; }
        .stat-n { font-size:1.1rem; font-weight:800; color:var(--text); display:block; }
        .stat-l { font-size:.65rem; color:var(--muted); font-weight:500; }
        .edit-btn { width:100%; background:#f1f5f9; border:none; font-size:.82rem; padding:9px; border-radius:20px; color:var(--text); cursor:pointer; font-weight:600; margin:10px 0; }
        .media-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:3px; margin-top:4px; }
        .media-item { aspect-ratio:1; background:#f1f5f9; border-radius:8px; overflow:hidden; position:relative; cursor:pointer; }
        .media-item img,.media-item video { width:100%; height:100%; object-fit:cover; }
        .vid-over { position:absolute; inset:0; background:rgba(0,0,0,.25); display:flex; align-items:center; justify-content:center; color:#fff; font-size:1.5rem; pointer-events:none; }
        .del-btn { position:absolute; top:4px; right:4px; background:rgba(0,0,0,.55); color:#fff; border:none; border-radius:50%; width:24px; height:24px; cursor:pointer; z-index:2; font-size:.65rem; display:flex; align-items:center; justify-content:center; }
        .add-media-btn { background:linear-gradient(135deg,var(--brand),var(--brand2)); border:none; color:#fff; width:34px; height:34px; border-radius:50%; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .logout-btn { background:none; border:1.5px solid #e2e8f0; border-radius:40px; padding:7px 18px; font-size:.78rem; color:var(--muted); cursor:pointer; font-weight:600; }

        /* CHAT */
        .conv-list { display:flex; flex-direction:column; gap:10px; }
        .conv-item { display:flex; align-items:center; gap:12px; background:#fff; padding:12px; border-radius:20px; border:1px solid #f0f0f0; cursor:pointer; }
        .conv-av { width:48px; height:48px; border-radius:50%; object-fit:cover; background:#fed7aa; flex-shrink:0; }
        .conv-name { font-weight:700; font-size:.88rem; }
        .conv-last { font-size:.73rem; color:var(--muted); margin-top:2px; }
        .chat-wrap { display:flex; flex-direction:column; height:100%; }
        .chat-hdr { display:flex; align-items:center; gap:10px; padding-bottom:12px; border-bottom:1px solid var(--border); margin-bottom:8px; }
        .chat-av { width:36px; height:36px; border-radius:50%; object-fit:cover; }
        .chat-msgs { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:8px; padding-bottom:8px; }
        .msg { max-width:78%; padding:9px 14px; border-radius:20px; background:#f1f5f9; font-size:.85rem; line-height:1.4; }
        .msg.me { align-self:flex-end; background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff; }
        .msg small { display:block; font-size:.65rem; margin-top:4px; opacity:.6; }
        .chat-input-row { display:flex; gap:8px; padding-top:10px; border-top:1px solid #edf2f7; }
        .chat-input-row input { flex:1; padding:11px 16px; border-radius:40px; border:1.5px solid #e2e8f0; font-family:inherit; font-size:.85rem; outline:none; }
        .chat-input-row input:focus { border-color:var(--brand); }
        .send-btn { background:linear-gradient(135deg,var(--brand),var(--brand2)); border:none; border-radius:40px; padding:0 18px; color:#fff; cursor:pointer; font-weight:700; font-size:1rem; }

        /* MISC */
        .back-link { background:none; border:none; font-size:.88rem; color:var(--brand); margin-bottom:14px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; font-weight:600; }
        .sec-title { font-weight:800; font-size:.95rem; color:var(--text); margin-bottom:14px; }
        .empty { text-align:center; padding:48px 20px; color:var(--muted); }
        .empty .ei { font-size:3rem; margin-bottom:12px; }
        .empty p { font-size:.88rem; }
        .loading { display:flex; align-items:center; justify-content:center; padding:48px; gap:10px; color:var(--muted); }
        .spinner { width:24px; height:24px; border:3px solid #e2e8f0; border-top-color:var(--brand); border-radius:50%; animation:spin .7s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .toast { position:fixed; bottom:88px; left:50%; transform:translateX(-50%); background:#1e293bdd; backdrop-filter:blur(8px); color:#fff; padding:9px 20px; border-radius:40px; z-index:300; opacity:0; transition:opacity .2s; pointer-events:none; font-size:.85rem; white-space:nowrap; }
        .toast.show { opacity:1; }
        .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.65); display:flex; align-items:center; justify-content:center; z-index:1000; }
        .modal-box { background:#fff; border-radius:32px; width:320px; max-height:90vh; overflow-y:auto; padding:24px; }
        .modal-box h3 { font-size:1.1rem; font-weight:800; margin-bottom:4px; }
        .modal-box label { font-weight:600; font-size:.78rem; display:block; margin:12px 0 5px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
        .modal-box input,.modal-box textarea { width:100%; padding:10px 14px; border-radius:20px; border:1.5px solid #e2e8f0; font-family:inherit; font-size:.88rem; outline:none; }
        .modal-box input:focus,.modal-box textarea:focus { border-color:var(--brand); }
        .chk-label { display:flex; align-items:center; gap:8px; font-weight:500; font-size:.85rem; margin-top:12px; }
        .modal-actions { display:flex; gap:10px; margin-top:20px; }
        .btn-save { flex:1; background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff; border:none; border-radius:40px; padding:12px; font-weight:700; cursor:pointer; }
        .btn-cancel { flex:1; background:#f1f5f9; border:none; border-radius:40px; padding:12px; font-weight:600; cursor:pointer; }
        footer { text-align:center; font-size:.68rem; color:#cbd5e1; margin-top:20px; padding-bottom:4px; }
    </style>
</head>

<div class="app-wrap">
    <!-- AUTH -->
    <div id="authScreen">
        <div class="auth-paw">🐾</div>
        <div class="auth-logo">Dogs</div>
        <div class="auth-tag">A rede social dos seus melhores amigos</div>
        <input class="auth-inp" type="email" id="authEmail" placeholder="seu@email.com">

        <div class="auth-err" id="authErr"></div>
        <button class="auth-btn" id="btnSubmit">Entrar</button>
        <div class="auth-divider">ou</div>
        <button class="auth-btn secondary" id="btnGoogle">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.8C34.1 33.9 29.6 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.5 0 20-7.6 20-21 0-1.3-.2-2.7-.5-4z"/></svg>
            Continuar com Google
        </button>
        <div class="auth-switch">
            Não tem conta? <a id="authToggle">Cadastre-se</a>
        </div>
    </div>

    <!-- APP -->
    <div id="appShell">
        <div class="app-header">
            <span class="logo">🐾 Dogs</span>
            <div class="hdr-actions" id="hdrActions"></div>
        </div>
        <div class="main" id="mainContent"></div>
        <div class="bottom-nav">
            <button class="nav-btn active" data-tab="feed"><i class="fas fa-home"></i><span>Feed</span></button>
            <button class="nav-btn" data-tab="explore"><i class="fas fa-search"></i><span>Explorar</span></button>
            <button class="nav-btn" data-tab="match"><i class="fas fa-paw"></i><span>Match</span></button>
            <button class="nav-btn" data-tab="profile"><i class="fas fa-dog"></i><span>Perfil</span></button>
        </div>
    </div>
</div>
<div id="toast" class="toast"></div>

let currentUser = null;
let userProfile = {};
let petsData = [];
let userLikes = new Set();
let userMatches = new Set();

// ============================================================
// UTILS
// ============================================================
function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

function showLoading() {
    document.getElementById('mainContent').innerHTML = '<div class="loading"><div class="spinner"></div> Carregando...</div>';
}

function errMsg(code) {
    const map = {
        'invalid_credentials': 'Email ou senha incorretos.',
        'email_not_confirmed': 'Confirme seu email antes de entrar.',
        'user_already_exists': 'Email já cadastrado.',
        'weak_password': 'Senha muito fraca (mín. 6 caracteres).',
        'invalid_email': 'Email inválido.',
    };
    return map[code] || 'Ocorreu um erro. Tente novamente.';
}

// ============================================================
// AUTH
// ============================================================
function initAuth() {
    const btnSubmit = document.getElementById('btnSubmit');
    const btnGoogle  = document.getElementById('btnGoogle');
    const toggle     = document.getElementById('authToggle');
    const nameInp    = document.getElementById('authName');
    const errDiv     = document.getElementById('authErr');

    toggle.onclick = () => {
        isSignUp = !isSignUp;
        btnSubmit.textContent = isSignUp ? 'Criar conta' : 'Entrar';
        nameInp.style.display = isSignUp ? 'block' : 'none';
        toggle.textContent = isSignUp ? 'Entrar' : 'Cadastre-se';
        toggle.previousSibling.textContent = isSignUp ? 'Já tem conta? ' : 'Não tem conta? ';
        errDiv.textContent = '';
    };

    btnSubmit.onclick = async () => {
        const email = document.getElementById('authEmail').value.trim();
        const pass  = document.getElementById('authPassword').value;
        const name  = document.getElementById('authName').value.trim() || 'Meu Pet';
        errDiv.textContent = '';
        if (!email || !pass) { errDiv.textContent = 'Preencha email e senha.'; return; }

        btnSubmit.disabled = true;
        btnSubmit.textContent = 'Aguarde...';

        if (isSignUp) {
            const { data, error } = await sb.auth.signUp({
                email, password: pass,
                options: { data: { full_name: name } }
            });
            if (error) { errDiv.textContent = errMsg(error.code || error.message); }
            else if (data.user && !data.session) {
                errDiv.style.color = 'var(--green)';
                errDiv.textContent = '✓ Confirme seu email e volte para entrar!';
            }
        } else {
            const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
            if (error) { errDiv.textContent = errMsg(error.code || error.message); }
        }

        btnSubmit.disabled = false;
        btnSubmit.textContent = isSignUp ? 'Criar conta' : 'Entrar';
    };

    btnGoogle.onclick = async () => {
        const { error } = await sb.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.href }
        });
        if (error) toast('Erro no login com Google: ' + error.message);
    };

    // Listener de sessão — dispara em login, logout e redirect OAuth
    sb.auth.onAuthStateChange(async (event, session) => {
        if (session?.user) {
            currentUser = session.user;
            enterApp();
        } else {
            currentUser = null;
            showAuthScreen();
        }
    });
}

function showAuthScreen() {
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('appShell').style.display = 'none';
}

async function enterApp() {
    document.getElementById('authScreen').style.display = 'none';
    const shell = document.getElementById('appShell');
    shell.style.display = 'flex';
    shell.style.flexDirection = 'column';
    shell.style.height = '100%';
    showLoading();
    await Promise.all([loadProfile(), loadPets(), loadSocialData()]);
    initNav();
    render();
}

// ============================================================
// DATA LOADERS
// ============================================================
async function loadProfile() {
    const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
    userProfile = data || {
        id: currentUser.id,
        name: currentUser.user_metadata?.full_name || 'Meu Pet',
        age: '', breed: 'SRD', bio: '',
        avatar_url: currentUser.user_metadata?.avatar_url || '',
        media: [], followers: 0, following: 0,
        is_for_adoption: false, adoption_description: ''
    };
    // Garante campo media como array
    if (!userProfile.media) userProfile.media = [];
}

async function loadPets() {
    const { data, error } = await sb.from('pets')
        .select('*, comments(*), profile_media(*)')
        .order('created_at', { ascending: false })
        .limit(30);

    if (error || !data || data.length === 0) {
        petsData = JSON.parse(JSON.stringify(PETS_FALLBACK));
    } else {
        petsData = data;
    }
}

async function loadSocialData() {
    // Likes do usuário
    const { data: likesData } = await sb.from('likes')
        .select('pet_id').eq('user_id', currentUser.id);
    userLikes = new Set((likesData || []).map(l => l.pet_id));

    // Matches do usuário
    const { data: matchData } = await sb.from('matches')
        .select('pet_id').eq('user_id', currentUser.id);
    userMatches = new Set((matchData || []).map(m => m.pet_id));

    // Conversas (mensagens agrupadas por pet)
    const { data: msgsData } = await sb.from('messages')
        .select('*').eq('sender_id', currentUser.id)
        .order('created_at', { ascending: true });
    conversations = {};
    for (const m of (msgsData || [])) {
        if (!conversations[m.pet_id]) conversations[m.pet_id] = [];
        conversations[m.pet_id].push({ text: m.text, fromMe: true, ts: m.created_at });
    }
}

// ============================================================
// SUPABASE STORAGE — upload de imagem
// ============================================================
async function uploadFile(file, path) {
    const { data, error } = await sb.storage.from('dogs-media').upload(path, file, { upsert: true });
    if (error) throw error;
    const { data: urlData } = sb.storage.from('dogs-media').getPublicUrl(path);
    return urlData.publicUrl;
}

// ============================================================
// NAV
// ============================================================
function initNav() {
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.onclick = () => {
            view = btn.dataset.tab;
            if (view === 'explore') searchQ = '';
            render();
        };
    });
}

function setActiveNav() {
    document.querySelectorAll('.nav-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === view);
    });
}

// ============================================================
// HEADER
// ============================================================
function renderHeader() {
    const c = document.getElementById('hdrActions');
    if (['feed','explore'].includes(view)) {
        c.innerHTML = `
            <button class="icon-btn" id="hChat">
                <i class="fas fa-comment-dots"></i>
                ${userMatches.size > 0 ? '<span class="notif-dot"></span>' : ''}
            </button>
            <img class="u-avatar" id="hProf"
                src="${userProfile.avatar_url || 'https://via.placeholder.com/28'}"
                onerror="this.src='https://via.placeholder.com/28'">`;
        document.getElementById('hChat').onclick = () => { view = 'chatList'; render(); };
        document.getElementById('hProf').onclick  = () => { view = 'profile'; render(); };
    } else if (['chatList','petProfile'].includes(view)) {
        c.innerHTML = `<button class="icon-btn" id="hBack"><i class="fas fa-arrow-left"></i></button>`;
        document.getElementById('hBack').onclick = () => { view = 'feed'; render(); };
    } else if (view === 'chatDetail') {
        c.innerHTML = `<button class="icon-btn" id="hBack"><i class="fas fa-arrow-left"></i></button>`;
        document.getElementById('hBack').onclick = () => { view = 'chatList'; render(); };
    } else {
        c.innerHTML = '';
    }
}

// ============================================================
// RENDER
// ============================================================
function render() {
    renderHeader();
    setActiveNav();
    const mc = document.getElementById('mainContent');
    switch(view) {
        case 'feed':       mc.innerHTML = buildFeed();       afterFeed();       break;
        case 'explore':    mc.innerHTML = buildExplore();    afterExplore();    break;
        case 'match':      mc.innerHTML = buildMatch();      afterMatch();      break;
        case 'profile':    mc.innerHTML = buildProfile();    afterProfile();    break;
        case 'petProfile': mc.innerHTML = buildPetProfile(); afterPetProfile(); break;
        case 'chatList':   mc.innerHTML = buildChatList();   afterChatList();   break;
        case 'chatDetail': mc.innerHTML = buildChatDetail(); afterChatDetail(); break;
    }
}

function buildFeed() {
    let h = '';
    // Stories
    h += `<div class="stories">
        <div class="story" id="addStory">
            <div class="add-story-btn"><i class="fas fa-plus"></i></div>
            <span class="story-name">Sua foto</span>
        </div>
        ${petsData.map(p => `
            <div class="story" data-spid="${p.id}">
                <div class="story-ring ${seenStories.has(p.id)?'seen':''}">
                    <div class="story-inner">
                        <img src="${p.img_url||''}" loading="lazy" onerror="this.src='https://via.placeholder.com/60'">
                    </div>
                </div>
                <span class="story-name">${p.name}</span>
            </div>`).join('')}
    </div>`;

    h += `<div class="sec-title">🐕 Pets para conhecer</div>`;

    // Meu card no topo
    h += buildCard({
        id: 'meuPet', name: userProfile.name, age: userProfile.age,
        breed: userProfile.breed, size: '', vacc: true,
        img_url: userProfile.avatar_url, description: (userProfile.bio||'').substring(0,80),
        likes_count: 0, comments: [], for_adoption: userProfile.is_for_adoption||false,
        adoption_desc: userProfile.adoption_description||'', isMe: true
    });

    for (const p of petsData) h += buildCard({...p, isMe: false});
    h += `<footer>🐾 Dogs — compartilhe momentos</footer>`;
    return h;
}

function buildCard(p) {
    const liked = userLikes.has(p.id);
    const cmts  = p.comments || [];
    const adopt = p.for_adoption === true;
    return `
    <div class="pet-card" data-cid="${p.id}" data-me="${p.isMe||false}">
        <img class="pet-img" src="${p.img_url||''}" onerror="this.src='https://via.placeholder.com/400'" loading="lazy">
        <div class="pet-info">
            <div class="pet-row">
                <strong>${p.name}${p.age?', '+p.age:''}</strong>
                <span class="badge ${p.vacc?'badge-v':'badge-nv'}">${p.vacc?'✓ Vacinado':'Pendente'}</span>
            </div>
            <div class="pet-sub">${[p.breed,p.size].filter(Boolean).join(' • ')}</div>
            <div style="font-size:.85rem">${p.description||''}</div>
            ${adopt&&p.adoption_desc?`<div class="adopt-banner"><i class="fas fa-home"></i>${p.adoption_desc}</div>`:''}
            <div class="actions">
                <button class="act-btn ${liked?'liked':''}" data-act="like" data-id="${p.id}">
                    <i class="fas fa-heart"></i> ${p.likes_count||0}
                </button>
                <button class="act-btn" data-act="cmt" data-id="${p.id}">
                    <i class="fas fa-comment"></i> ${cmts.length}
                </button>
                <button class="act-btn" data-act="share" data-id="${p.id}">
                    <i class="fas fa-share-alt"></i>
                </button>
                ${!p.isMe?`<button class="match-sm" data-act="match" data-id="${p.id}"><i class="fas fa-paw"></i> Match</button>`:''}
                ${adopt&&!p.isMe?`<button class="adopt-sm" data-act="adopt" data-id="${p.id}"><i class="fas fa-hand-holding-heart"></i> Adotar</button>`:''}
            </div>
            <div class="comments-box" id="cmtbox-${p.id}">
                ${cmts.length===0?'<div style="color:var(--muted);font-size:.8rem">Seja o primeiro a comentar 🐾</div>':
                    cmts.slice(0,3).map(c=>`<div class="comment-item"><strong>${c.author_name||'Usuário'}:</strong> ${c.text}<br><small style="color:var(--muted)">${c.created_at?new Date(c.created_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):''}</small></div>`).join('')}
                <div class="add-cmt">
                    <input type="text" id="ci-${p.id}" placeholder="Comentar...">
                    <button class="btn-cmt-send" data-act="cmt-send" data-id="${p.id}">→</button>
                </div>
            </div>
        </div>
    </div>`;
}

function afterFeed() {
    document.getElementById('addStory')?.addEventListener('click', () => toast('📸 Stories em breve!'));
    document.querySelectorAll('[data-spid]').forEach(el => {
        el.addEventListener('click', () => {
            seenStories.add(el.dataset.spid);
            petProfileId = el.dataset.spid;
            view = 'petProfile'; render();
        });
    });
    document.querySelectorAll('.pet-card').forEach(card => {
        card.addEventListener('click', e => {
            if (e.target.closest('[data-act]')) return;
            if (card.dataset.me === 'true') { view = 'profile'; render(); return; }
            petProfileId = card.dataset.cid;
            view = 'petProfile'; render();
        });
    });
    document.querySelectorAll('[data-act]').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopPropagation();
            const id = btn.dataset.id, act = btn.dataset.act;
            if (act === 'like') toggleLike(id);
            else if (act === 'cmt') { const b = document.getElementById('cmtbox-'+id); if(b) b.style.display = b.style.display==='block'?'none':'block'; }
            else if (act === 'share') { if(navigator.share) navigator.share({title:'Dogs',url:location.href}); else { navigator.clipboard?.writeText(location.href); toast('Link copiado!'); } }
            else if (act === 'match') doMatch(id);
            else if (act === 'adopt') openChat(id);
            else if (act === 'cmt-send') { const inp = document.getElementById('ci-'+id); if(inp?.value.trim()){ addComment(id,inp.value); inp.value=''; } }
        });
    });
}

function afterExplore() {

    });
}

// MATCH
// ============================================================
function buildMatch() {
    const pool = petsData.filter(p => !userMatches.has(p.id));
    const p = pool[0];
    if (!p) return `<div class="empty"><div class="ei">🎉</div><p>Você já deu match com todos!</p></div>`;
    return `
        <div class="sec-title">🔥 Encontre um amigo</div>
        <div class="pet-card" style="margin-bottom:12px">
            <img class="pet-img" style="height:300px" src="${p.img_url}" onerror="this.src='https://via.placeholder.com/400'">
            <div class="pet-info">
                <div class="pet-row">
                    <strong>${p.name}, ${p.age}</strong>
                    <span class="badge ${p.vacc?'badge-v':'badge-nv'}">${p.vacc?'✓ Vacinado':'Pendente'}</span>
                </div>
                <div class="pet-sub">${p.breed} • ${p.description}</div>
                ${p.for_adoption?`<div class="adopt-banner"><i class="fas fa-home"></i>${p.adoption_desc||'Disponível para adoção'}</div>`:''}
            </div>
        </div>
        <div class="match-actions">
            <button class="m-pass" id="mPass"><i class="fas fa-times"></i></button>
            <button class="m-like" id="mLike"><i class="fas fa-paw"></i></button>
        </div>
        <p style="text-align:center;font-size:.75rem;color:var(--muted);margin-top:14px">${pool.length} pets aguardando 🐾</p>`;
}

function afterMatch() {
    const pool = petsData.filter(p => !userMatches.has(p.id));
    const p = pool[0];
    document.getElementById('mLike')?.addEventListener('click', () => { if(p) doMatch(p.id); });
    document.getElementById('mPass')?.addEventListener('click', () => {
        if (p) { petsData = petsData.filter(x=>x.id!==p.id); petsData.push(p); }
        toast('😅 Próximo!'); render();
    });
}

                    <button class="del-btn" data-di="${i}"><i class="fas fa-times"></i></button>
                </div>`).join('')}
            ${media.length===0?'<div style="grid-column:span 3;text-align:center;color:var(--muted);padding:20px;font-size:.8rem">➕ Adicione suas fotos</div>':''}
        </div>
        <div style="margin-top:20px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:center">
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Sair da conta</button>
        </div>
        <footer>🐕 Dogs • Supabase</footer>`;
}

function afterProfile() {
    const avArea = document.getElementById('avArea');
    const avFile = document.getElementById('avFile');
    avArea.onclick = () => avFile.click();
    avFile.onchange = async e => {
        const f = e.target.files[0];
        if (!f) return;
        toast('Enviando foto...');
        try {
            const url = await uploadFile(f, `avatars/${currentUser.id}_${Date.now()}`);
            await sb.from('profiles').update({ avatar_url: url }).eq('id', currentUser.id);
            userProfile.avatar_url = url;
            toast('Avatar atualizado! 🐾');
            render();
        } catch(err) { toast('Erro no upload: ' + err.message); }
    };

    document.getElementById('editBtn').onclick = showEditModal;

    document.getElementById('addMedia').onclick = () => {
        const inp = document.createElement('input');
        inp.type='file'; inp.accept='image/*,video/*';
        inp.onchange = async e => {
            const f = e.target.files[0];
            if (!f) return;
            const type = f.type.startsWith('image/')? 'image' : f.type.startsWith('video/')? 'video' : null;
            if (!type) { toast('Formato não suportado'); return; }
            toast('Enviando mídia...');
            try {
                const url = await uploadFile(f, `media/${currentUser.id}/${Date.now()}`);
                await sb.from('profile_media').insert({ user_id: currentUser.id, type, url });
                userProfile.media.push({ type, url });
                toast(`${type==='image'?'Foto':'Vídeo'} adicionado!`);
                render();
            } catch(err) { toast('Erro: ' + err.message); }
        };
        inp.click();
    };

    document.querySelectorAll('[data-di]').forEach(btn => {
        btn.onclick = async e => {
            e.stopPropagation();
            if (!confirm('Remover?')) return;
            const idx = parseInt(btn.dataset.di);
            const item = userProfile.media[idx];
            if (item) {
                // Remove do storage e do banco
                const path = item.url.split('/dogs-media/')[1];
                if (path) await sb.storage.from('dogs-media').remove([path]);
                await sb.from('profile_media').delete().eq('url', item.url).eq('user_id', currentUser.id);
                userProfile.media.splice(idx, 1);
            }
            toast('Removido');
            render();
        };
    });

    document.getElementById('logoutBtn').onclick = async () => {
        if (!confirm('Sair da conta?')) return;
        await sb.auth.signOut();
    };
}

function showEditModal() {
    const p = userProfile;
    const m = document.createElement('div');
    m.className = 'modal-bg';
    m.innerHTML = `
        <div class="modal-box">
            <h3>✏️ Editar perfil</h3>
            <label>Nome do pet</label><input id="eN" value="${p.name||''}">
            <label>Idade</label><input id="eA" value="${p.age||''}">
            <label>Raça</label><input id="eB" value="${p.breed||''}">
            <label>Bio</label><textarea id="eBio" rows="3">${p.bio||''}</textarea>
            <label class="chk-label"><input type="checkbox" id="eAdopt" ${p.is_for_adoption?'checked':''}> Disponível para adoção</label>
            <div id="adoptGrp" style="${p.is_for_adoption?'':'display:none'}">
                <label>Descrição para adoção</label>
                <textarea id="eAdoptDesc" rows="2">${p.adoption_description||''}</textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="mCancel">Cancelar</button>
                <button class="btn-save" id="mSave">Salvar</button>
            </div>
        </div>`;
    document.body.appendChild(m);
    m.querySelector('#eAdopt').onchange = e => {
        m.querySelector('#adoptGrp').style.display = e.target.checked ? '' : 'none';
    };
    m.querySelector('#mSave').onclick = async () => {
        const updates = {
            name: m.querySelector('#eN').value,
            age: m.querySelector('#eA').value,
            breed: m.querySelector('#eB').value,
            bio: m.querySelector('#eBio').value,
            is_for_adoption: m.querySelector('#eAdopt').checked,
            adoption_description: m.querySelector('#eAdoptDesc').value
        };
        const { error } = await sb.from('profiles').update(updates).eq('id', currentUser.id);
        if (error) { toast('Erro ao salvar: ' + error.message); return; }
        Object.assign(userProfile, updates);
        toast('Perfil atualizado! 🐾');
        m.remove();
        render();
    };
    m.querySelector('#mCancel').onclick = () => m.remove();
    m.onclick = e => { if(e.target===m) m.remove(); };
}

// ============================================================
// CHAT LIST
// ============================================================
function buildChatList() {
    const ids = new Set([...Object.keys(conversations), ...[...userMatches]]);
    const pets = [...ids].map(id => petsData.find(p=>p.id===id)).filter(Boolean);
    if (!pets.length) return `<div class="empty"><div class="ei">💬</div><p>Nenhuma conversa ainda.<br>Dê match com um pet!</p></div>`;
    return `<div class="sec-title">💬 Conversas</div>
        <div class="conv-list">
        ${pets.map(p => {
            const msgs = conversations[p.id]||[];
            const last = msgs.length ? msgs[msgs.length-1].text.substring(0,40) : 'Iniciar conversa';
            return `<div class="conv-item" data-cpid="${p.id}">
                <img class="conv-av" src="${p.img_url}" onerror="this.src='https://via.placeholder.com/48'">
                <div><div class="conv-name">${p.name}</div><div class="conv-last">${last}</div></div>
            </div>`;
        }).join('')}
        </div>`;
}

function afterChatList() {
    document.querySelectorAll('[data-cpid]').forEach(el => {
        el.onclick = () => { chatPetId = el.dataset.cpid; view='chatDetail'; render(); };
    });
}

// ============================================================
// CHAT DETAIL
// ============================================================
function buildChatDetail() {
    const p = petsData.find(x=>x.id===chatPetId);
    if (!p) return `<div class="empty"><div class="ei">🐕</div><p>Pet não encontrado</p></div>`;
    const msgs = conversations[chatPetId]||[];
    return `<div class="chat-wrap">
        <div class="chat-hdr">
            <img class="chat-av" src="${p.img_url}" onerror="this.src='https://via.placeholder.com/36'">
            <strong style="font-size:.9rem">${p.name}</strong>
            ${p.for_adoption?'<span class="badge badge-a" style="margin-left:auto">🏠 Adoção</span>':''}
        </div>
        <div class="chat-msgs" id="chatMsgs">
            ${msgs.length===0?`<div class="empty" style="padding:20px"><div class="ei">🐾</div><p>Diga olá para ${p.name}!</p></div>`:''}
            ${msgs.map(msg=>`<div class="msg ${msg.fromMe?'me':''}">
                ${msg.text}
                <small>${msg.ts?new Date(msg.ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):''}</small>
            </div>`).join('')}
        </div>
        <div class="chat-input-row">
            <input type="text" id="chatInp" placeholder="Mensagem...">
            <button class="send-btn" id="sendBtn">→</button>
        </div>
    </div>`;
}

function afterChatDetail() {
    const inp = document.getElementById('chatInp');
    const send = async () => {
        const txt = inp?.value?.trim();
        if (!txt) return;
        // Salva no Supabase
        await sb.from('messages').insert({
            sender_id: currentUser.id,
            pet_id: chatPetId,
            text: txt
        });
        if (!conversations[chatPetId]) conversations[chatPetId] = [];
        conversations[chatPetId].push({ text: txt, fromMe: true, ts: new Date().toISOString() });
        inp.value = '';
        render();
        // Auto-resposta demo
        const p = petsData.find(x=>x.id===chatPetId);
        setTimeout(() => {
            const reply = p?.for_adoption ? '🐾 Obrigado pelo interesse! Vamos conversar sobre adoção.' : `🐕 Oi! Sou ${p?.name||''}. Prazer!`;
            conversations[chatPetId].push({ text: reply, fromMe: false, ts: new Date().toISOString() });
            if (view==='chatDetail') render();
        }, 900);
    };
    document.getElementById('sendBtn')?.addEventListener('click', send);
    inp?.addEventListener('keypress', e => { if(e.key==='Enter') send(); });
    inp?.focus();
    const msgs = document.getElementById('chatMsgs');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

// ============================================================
// ACTIONS
// ============================================================
async function toggleLike(id) {
    if (userLikes.has(id)) {
        await sb.from('likes').delete().eq('user_id', currentUser.id).eq('pet_id', id);
        await sb.from('pets').update({ likes_count: sb.rpc('decrement', { x: 1 }) }).eq('id', id);
        userLikes.delete(id);
        const p = petsData.find(x=>x.id===id);
        if (p) p.likes_count = Math.max(0, (p.likes_count||1)-1);
        toast('Curtida removida');
    } else {
        await sb.from('likes').insert({ user_id: currentUser.id, pet_id: id });
        userLikes.add(id);
        const p = petsData.find(x=>x.id===id);
        if (p) p.likes_count = (p.likes_count||0)+1;
        toast(`❤️ Curtiu ${p?.name||''}!`);
    }
    render();
}

async function doMatch(id) {
    if (userMatches.has(id)) { toast('Já deu match!'); return; }
    await sb.from('matches').insert({ user_id: currentUser.id, pet_id: id });
    userMatches.add(id);
    if (!conversations[id]) conversations[id] = [];
    const p = petsData.find(x=>x.id===id);
    showMatchPopup(p);
}

function showMatchPopup(p) {
    const el = document.createElement('div');
    el.className = 'match-popup';
    el.innerHTML = `
        <div class="match-popup-title">🎉 É um Match!</div>
        <div class="match-popup-sub">Você e ${p.name} agora podem conversar</div>
        <div class="match-popup-avatars">
            <img class="match-popup-avatar" src="${userProfile.avatar_url||'https://via.placeholder.com/88'}" onerror="this.src='https://via.placeholder.com/88'">
            <img class="match-popup-avatar" src="${p.img_url}" onerror="this.src='https://via.placeholder.com/88'">
        </div>
        <button class="match-popup-go" id="mpChat">Iniciar conversa 💬</button>
        <button class="match-popup-skip" id="mpSkip">Agora não</button>`;
    document.body.appendChild(el);
    document.getElementById('mpChat').onclick = () => { el.remove(); chatPetId=p.id; view='chatDetail'; render(); };
    document.getElementById('mpSkip').onclick = () => el.remove();
    el.onclick = e => { if(e.target===el) el.remove(); };
}

async function addComment(id, text) {
    const { data, error } = await sb.from('comments').insert({
        user_id: currentUser.id,
        pet_id: id,
        author_name: userProfile.name || 'Usuário',
        text
    }).select().single();
    if (!error && data) {
        const p = petsData.find(x=>x.id===id);
        if (p) { if(!p.comments) p.comments=[]; p.comments.unshift(data); }
    }
    render();
}

function openChat(id) {
    if (!conversations[id]) conversations[id] = [];
    chatPetId = id; view = 'chatDetail'; render();
}

// ============================================================
// BOOT
// ============================================================
initAuth();
</script>

<script>
// PWA — Service Worker
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
            .then(r => console.log('SW registrado:', r.scope))
            .catch(e => console.warn('SW falhou:', e));
    });
}

// PWA — Prompt de instalação
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    setTimeout(() => {
        if (deferredPrompt && currentUser) showInstallBanner();
    }, 10000);
});

function showInstallBanner() {
    if (document.getElementById('installBanner')) return;
    const banner = document.createElement('div');
    banner.id = 'installBanner';
    banner.style.cssText = [
        'position:fixed','bottom:88px','left:50%','transform:translateX(-50%)',
        'background:#fff','border:1.5px solid #f0f0f0','border-radius:20px',
        'padding:12px 18px','z-index:400','display:flex','align-items:center',
        'gap:12px','box-shadow:0 8px 24px rgba(0,0,0,.12)','white-space:nowrap',
        'font-family:Inter,sans-serif','font-size:.82rem'
    ].join(';');
    banner.innerHTML =
        '<span style="font-size:1.4rem">🐾</span>' +
        '<div><div style="font-weight:700;color:#1e293b">Instalar Dogs</div>' +
        '<div style="color:#94a3b8;font-size:.75rem">Adicionar à tela inicial</div></div>' +
        '<button id="installBtn" style="background:linear-gradient(135deg,#f97316,#e11d48);color:#fff;border:none;border-radius:40px;padding:7px 16px;font-weight:700;cursor:pointer;font-size:.78rem">Instalar</button>' +
        '<button id="dismissBtn" style="background:none;border:none;font-size:1.1rem;cursor:pointer;color:#94a3b8">✕</button>';
    document.body.appendChild(banner);
    document.getElementById('installBtn').onclick = async () => {
        banner.remove();
        deferredPrompt.prompt();
        const result = await deferredPrompt.userChoice;
        deferredPrompt = null;
        if (result.outcome === 'accepted') toast('🎉 Dogs instalado!');
    };
    document.getElementById('dismissBtn').onclick = () => banner.remove();
}

window.addEventListener('appinstalled', () => {
    deferredPrompt = null;
    toast('🐾 Dogs instalado com sucesso!');
});
</script>
</body>
